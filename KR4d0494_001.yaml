body:
  text: 道園遺稿卷一元虞集撰操釣雪操鑿方池兮山之曲仰喬松兮倚修竹四時來兮無不足嵗之寒兮天雨玉雨玉兮滿庭豫何思兮折芳馨魚潛淵兮亦在藻言將求之以忘老鰷鱨兮鰋鯉有酒兮多㫖霏霏兮來思上友兮君子古詩四言致樂堂詩并序致樂堂者集賢待制周君之所以奉母者也蜀郡虞集為之賦詩曰翼翼新堂有閫有房夫人來居既安既舒既好既寧載燠載清言䦱于門以寫我誠有齊其馬有伉其軒為子來者允貴且賢貴容舒遲賢有令儀爾因爾宗先君之思翕爾兄弟具于嘉㫖我飲我食先君之子詩言溫柔禮言著存我撫我惠先君之孫樂哉誰氏維周壽母疇克致兹周南仲子君子善頌文則多有又永歌之以導燕喜萬户張公廟堂詩并序大德辛丑昭勇大將軍河南征行萬户鎮通州張公以其兵從征緬死之通人作廟以祀公三十年間朝之公卿大夫士能為文章者莫不為之有所製作泰定丁卯公子御史亦俾豫賦之集以為征緬事始末在朝諸君子則知之矣通州僻在江海之際其人何自知之況久逺乎且不著夫狂夫首禍之故成宗皇帝聖明卒致其罪則公所以不肯墮其搆陷必甲胄以死之意亦終不白于通人之將來也故稍原其始而道之庶其有考也詩曰於赫世皇並用豪傑一定宇內櫜厥戈甲既久既安成宗繼之祖功莫加道在守持狂夫興謀以動相國曰昔祖宗咸尚戰克萬方悉來史皆前能我獨無名曷稱繼承蠢彼西南翳叢負固聚落八百各統女婦人强善驕馬貝競豪豢豕于牢黃金飾槽取而有之富可足用赫乎功多以世智勇相臣以聞天子曰嘻有是言哉汝其試之狂謀既售諫言不入既賦軍實弓鉞仍戢餽餉啓行萬里騷然飢危蹈毒未戰已捐番番名將天子爪士鎮于江滸天子所使狂夫忌之承制驅之詎思國謀徒逞厥私將軍慨言死我臣職可陷者身不陷吾直見制鄙庸豈我召凶心知無還況冀立功與其矯誣死于狂手孰與奮擊不喪吾守孤旅轉戰深入不回殺僇既多身卒死之三軍失聲萬士喪氣孰明公心君門萬里裹革東歸遙遙江壖部曲候迎悲風斾纒民懷其忠士感其義虎奮鷹揚如見其至卜廟得吉東望際海神來妥之有永無壞狂夫辱國天子震怒立呼狂豎斬以大斧狂罪則誅死事奈何褒封哀榮百世不磨豈惟不磨元嗣御史既有兄弟又多孫子奕奕勳門秩秩良材天之報忠豈有涯哉柏堂詩并序崇仁劉觀母熊氏有貞節觀作堂奉之翰林學士吳先生有記藝文監丞揭曼碩氏作頌朝賢多繼之元統癸酉集歸自京師亦為之賦焉翼翼新堂深明髙安嘉樹在庭維柏桓桓霜降露濡載寒載溫嵗以序遷我有恆歡惟時壽母來居來言昔扶弱支今撫其繁先君之思永矢弗捐視此庭堅不忘以存肅肅令子敬共前聞婉婉有容郁郁有文宜其室家長其子孫暖日扶輿涼風進軒駕言忘憂游息山園閣􅍥淳珍匜泛鬯芬樂時和豐具養無愆孰栖爾柏翽翽其鸞里人瞻之孝慈之門君子有言德風攸敦敢告司藝善培根原題胡徵君器之和陶軒春木晨榮秋華夕滋流雲行天逝者如斯柴車葛巾曷能歸來我懷古人徒頌其詩有美君子尚友先覺靡觴不吟無詠不屬豈無他人孰此追躅優哉游哉君子之樂吾儕小人力絀乃休猶可以馳曷其停輈卷舒無悶入聖實優敢以未成竊方前修祖德之述尚論其世我獨何為夙墮羈縶聞君贊歌祗以生愧既曰知非請朂餘嵗集讀書山中時草屋三間以紙糊其壁舍弟仲常為書邵子諸詩于東謂之邵菴書陶詩於西謂之陶菴吳先生見而嘆之以為世內無窮之悲世外無窮之樂也心逺堂詩渺渺平湖其際維山飛鳥載雲晨往夕還平湖瀰瀰薄于山止雲窮于飛目力無際慨昔周遊山川邈悠忽焉興懷一息九州千古既往萬古方至悠悠我思譬彼逝水樂哉君子其居深深不遨以寧式究厥心題上官樵寓青松為關白雲為户其迎無賔其住非主假夢得鹿遇奕忘斧不去不留是曰樵寓東坡戴履圖謫居荒濵無誰與語言從諸黎歸在中途風雨適至借具田父狺童怪隨傳像畫者笠以雨來屐以泥行匪以為容用適其情朝衣軒車固將若驚恆服爾假猶不豫寧含德之厚混迹于俗巍巍勛華天章轉燭幽囚野死曽莫指目我不自忘的致凝矚偉哉天人其猶神龍其來無迎其去誰從形擬猶差矧是飾容世無其人神交或逢洞賔像洞庭無波明月萬里我時見之劍若秋水玉清道士魚障春雷發聲風雨時至古石龍門一躍千里我服神丹得為水仙鱗鱗媵豫飛朝九天墨蘭遍遊楚澤枝訊葉辨使讀騷者得見真面好風東來其葉紛披所不隨者懷芳自持歷沅跨湘無二無雜向一毫端生分别法日莫無雲微風扇和樹之百畝寧愁其多畫魚東人結網西人溉鬵滄海長往吾獨何心古詩五言次韵答袁伯長學士十首衡門有一士閉户守𤣥一修之三十載深不願世述晶光無淪降赫赫抱靈質終然不可掩煦物若春日斗酒相勞苦聊樂不為怠葅醢備百索嘉此嵗無害馳驅廢穡事每為同里慨縣官庶能念中嵗得半代春花好顔色持以勸君酒君今不識察後竟似今不悲歌無轉喉拙舞不運肘生不與世諧死寧同世朽少年學為琴豈惜為君撫知音不在今在昔或可數逺遊竟不值歸將託幽阻念子獨我求龍門作風雨雞鳴當知晨草緑當知春出山復懷歸永愧先幾人飛篷離本條縱浪隨風塵流水東入海逝者何踆踆兩丘各岧嶤荒墜下深迫狐狸號其顛儀秦此幽宅二子昔在世往復相十百所以學仙人劇飲謝天厄跕屣鳴趙瑟揚眉鼓秦弦逺奔萬金室窈窕若雲烟安知碧草晚飛光無復年聲名竟不立淪落世羞傳疏傅出漢庭決去豈不偉未能忘懷樂日問金餘幾陶生行乞食何有口腹纍鄧郎臨死時不復作簪屣少年頗濩落偃蹇無所承長大不得食常持一半氷昔為井中泥今為井上瓴未得復故初灌輸效微能梧桐失故䕃丹鳳蓄餘戀去之千仭端十載始來見髙秋竹無實忽忽恐復逺昆丘玉為田為子採芝箭早起馳騖亦已久淹留竟何成疇昔夢至家屋舍還敧傾晨思理垣墉夕念鉏榛荆唯恐嵗年莫惕然心為驚歸去非有難納履斯遄征永言得安居庶無愧平生時運忽在秋觴目非故先衰蟬厲短噪雜英綴微鮮昔人知化育能事本無言翕然變時雍皞皞同其天斷琴具斯意一鼓三絶絃寥寥竟何補戚戚徒自憐夜坐露坐廣庭夕海氣接清皓毛髮感森爽幽憂集中抱寄身百年內變化不待老區區事形骸所競非所寶昧兹動靜間生理誠草草聖言就湮沒迷散費深討所恨精力微何以相斯道溽暑多蚊虻起滅尋尺內稍思出夷曠髙眠釋煩憒凝神一無為消息任往來怡然以終古熒熒自乘載消搖日月上下視渺蘇塊如何在世間動輒為形礙得見王子喬吾將解蒼佩遊長春宫詩分韵得在字神宫古城端千里見畿內幽關挾北户連嶂鎖西黛南樹蕩何極東溟渺無礙中天積紫翠雲氣常靉靆孰云萬有賾攬括固兹在竒懷得縱觀指顧生百慨天風正浩蕩春物尚茫昧翻愁目力短奕奕飛鳥背永感神禹迹願託穆王載仙人騎黃鵠一往不復徠忽然㑹豫心雲中贈雙珮題張希孟凝雲石海石不盈握隤然如委雲危岑集逺思虛竇棲微薰天髙泰華斷日出香爐分几研襲清潤文章互絪緼潛雷起神谷震驚天上聞亟視恐無及化為九龍文題許願夫抗雲樓城居苦迫隘層䦨上岧嶤措身方丈間千里心目超可以抗浮雲誰能顧塵囂擬峴有古臺遺碑正蕭條子固若星斗其魂安可招龎公輟耕際頗懷見凌霄賦詩托飛鳥長空何寥寥次韻袁伯長贈陶心山憶昔白雲君髙居保黃寧夕煉黃帝鼎晨注神農經羣真時滿坐逸響每盈庭寸田既無畔幽關那有扃飛淩萬物表婆娑垂帶鈴歸來塵世外曽孫宴虛亭所志在髙逺三峯列青冥頽然得所止一念三千齡崑崙安明珠旭日曜帝青槃桓有童子松根求茯苓送周東揚赴零陵分韻得鳥字拂劒池水秋理棹湘江曉地古記載多時清徵發少雨洗崖石文風作林谷窅應上朝陽巖東望聽啼鳥魏氏園亭分韵得池字託好自故國傾懷得新知授館澗谷居張筵芙蓉池髙僧攝香至清唱入雲遲況陪兩時彥羣從俱忘疲仲夏乃積雨水花各華滋髙栁尤故物臨風復披披曽見百年外飛蓋來參差隆替與時邁百室無一遺盛德獨能逺感慨更共之西風白鶴表落日滄江湄二老昔並世遺書方在兹勗哉保傳業子孫以相貽喜雨分韵得須字下車未逾月十日九馳驅秪知府事殷不聞燕寢娛傳呼當夙興落月啼城烏中衢塵不動肅肅來車徒借問何所往髙堂集羣儒列坐多皓首巍冠講唐虞逐以青襟升鼓篋何于于是時天氣髙市童雜呼雩風雲東南合倐然靈雨俱緩帶却煩劇清涼變斯須麗澤深有悅羣生亦昭蘇逍遙池閣上何必欣戚殊鄭同甫書帶草軒六籍久將墜鄭君家多書韋編苦易絶掇拾收蟲魚幽草長春雨參差在庭除紉結可束素垂之仍有餘焉知廣文舍猶如不其居光風動交翠汗青羅綺疏熠耀照屋壁烟雲隨卷舒春夢不可長蟾輝墮簷虛故人舊題字使我增欷歔朱秀之杞菊軒髙軒何所植杞菊交根枝紫實既秋熟黃花亦晚滋嘉名信共愛何以療豫飢此邦號富庶士賈志懷資蕭條山間石誰復見惸嫠遺脫兼并餘椎剝無完肌縱彼百畝受豈得安耘耔種此頃步內庶無征奪思採擷勿違節亨芼貴有宜三咽可千嵗逍遙奉天隨某遊吳中因省墓山間頗見田野有可念因贊髙軒之樂而及之庶觀風者之有采而知之者櫃軒詩并序吳郡故有金氏名章者仕宋為迪功郎家饒于資而好施豫子孫相承以孝友著稱迄今室居尚存五世孫在讀書飭行鄉里尤稱為善人君子嘗手植櫃樹于家其本初甚微未幾益滋茂因搆軒於旁名之曰櫃軒某嘗登是軒遂為賦詩以紀其事在字潤甫樂善其自號云東南有嘉樹䕃彼君子居君子秺侯裔積善慶有餘俯仰二百年猶是舊室廬一朝種兹樹翻然向庭除種來能幾何倐爾凌空虛亭亭結根據枝葉交扶疏髙軒搆爽塏對此頻軒渠芳春膏雨沐炎夏薰風噓君子日夷猶淡然塵慮攄對客共談笑課兒事詩書昭昭穹壤間此樂復何如朅來數十年此樹髙于初信知君子德嵗久同發舒願言繼封植勿共荆棘鋤庶幾魏公槐于今復權輿聽秋軒為僧賦道人攝袈裟深坐滅盡定長松結層霄密竹生晝瞑龍吟崖石隂鳥度池月瑩秋從何處來觸塵成我聽振空林外錫旋復室中磬耳門證三昧圓應普虛罄所懷丹丘山春夢一擊醒等此聞性觀素壁寫三徑玉壺堂詩并序積水之極蔚然中丘渾淪穹隆匡廓扶輿就之若虛履之若浮人不可到也而仙者居之以其圜中而方外也謂之壺焉聞有何公真人有依緑之園蓋取諸水也又有玉壺之堂殆擬此與㑹稽鄙夫曰先天地生巍巍尊髙旁有垣闕狀如蓬壺曲閣相通可以踟蹰且玉者積陽至剛純粹之精取類恐符哉看雲叟曰是吾師也子為我賦之乃賦曰真人德孔容治生尺石間外質謝追琢中虛保堅完合璧映華蓋懸珠隱泥丸天地立有極日月循無端晨從密霧入夕與飛景還足履五文絲首冠夫容丹行厨膳琅膏燕坐以盤桓弟子看雲叟疇昔為我言往見不可得期之三千年送可無上人五公昔講時聽者不起坐虛空悉銷殞何由見人我名字誰與安說義話已墮尚自無亦無更問可不可不見天雨華誰能拾餘朵送南野真人山中積雪盡江南春水多解劒還尚方朝衣挂松蘿城門望羽節扁舟聞櫂歌故園良已適昔遊將奈何閒雲棲古樹空談遺落花何如兩衰鬢相將照江波次韵鄧善之遊山中杖藜入南山却立賞竒秀所懷玉局翁來往絇履舊空餘松在澗仍作琴筑奏徘徊龍井上雲氣起晴晝入門避霑灑脫屐亂苔甃陽岡扣雲石隂房絶遺構澄公愛客至取水極幽竇坐我簷蔔中餘香不聞嗅但見瓢中清翠影落羣岫烹煎黃金芽不取榖雨後同來二三子三咽不忍嗽講堂集羣彥千鐙坐吟究浪浪雜飛雨沈沈度清漏令我懷幼學胡為裹章綬題王眉叟真人溪居對月圖長松千尺起白石下磷磷隱居愜素念燕坐見間身溪流宛無異月色亦常新悠悠宇宙內住亭名主人題天台柯東谷泛觀天台圖始識柯東谷草樹何蒙茸循澗入深曲升髙雲繞身厲淺石嚙足桃花一千樹隔竹映茅屋中有學仙子黃庭晝常讀俯聽下𤣥鶴逺至馴白鹿疑是司馬君髙繼陶生躅臨海賔出日蓻圃收種玉除是太白來此句方可續春山曉雲圖置屋雲崖隂耕田雲洞表積雨白霧收逺林翠波曉農人告春及扶杖驚窈窕久與塵事違冥鴻送孤矯山居避暑圖急雨山泉落長松激回風靈響從天來夜髙旦彌雄龍眠九州虛鶴起曽霄空羽衣者誰子從我入雲中秋江待渡圖江潭秋木落臨流送將歸微風蕩去楫相近更逺違違客從一翁吹簫白雲飛我乃命黃鶴乘之待前磯雪嶺盤車圖玉關積雪髙十里百盤摺槖駝便平闊望劍已愁絶時平無從軍道逺可由竭惟應飛行仙萬仭俯璚闕雲屋圖曽山出雲氣還自為文章木石共蒙被容華生老蒼朝來既非跡夕往亦何藏道人宴坐次見之以為常了知不可繪相對聊徜徉羣鮮朝鯉圖吾嘗觀剝象貫魚何翩翩其類實繁多咸仰宗厥顛金鱗三十六其數隂已極用變乃純剝飛躍見天則於惟君子升大小宜畢興雷風既動蕩雷雨方騰蒸倦客年五十讀易未知道觀物每興懷玩心以忘老爾時卧田里所願得豐年欲占小人夢乃為畫者傳謝吳宗師送芍藥名酒講臣不常參寂寞奉朝請故人得好花持贈乃兼并金盤日中出品目標禁省一萼重數銖大與牡丹並釀香實尊貴深婉更和靜居然荷慰藉相對空晝永起求神農經録在海涯境夭夭羡厥草曽不耀朱景上京素髙寒夏至氷在井沙草不滿寸苞葉成枯梗同生非異土榮悴何不等此豈夫容丹逡巡太陽鼎灼灼天女嬪巍巍步搖整盈盈綃卷膚況彼南國逈移置諒不可孤賞且深領雖與名酒俱絶飲畏停冷頗聞好事者采擷置充茗刀圭果三咽五臟化俄頃文章麗出日儀鳳同煥炳言誇衆應疑所貴仙者肯次韵天台張秋原張侯殊可人長著百斛酒吾來輒取醉未晏卧罌缶吾意適君㑹斟酌愧勤厚清濁無所嫌但喜杯在手不負頭上巾每懷陶五栁寄青城道者海上别妻子山中求伏苓白虎戲𤣥渚蒼龍護黃扄燒香招五老行厨庖天丁從子似非逺丹霞粲華星十月十八日聽誦道書崑崙極髙大九巖觀其顛空洞蓄幽渺絪緼遂回旋真情惚恍際純明徹幽𤣥倒影俯白日浮氣堆紫烟竒文妙變化靈響合自然降神作賢聖理物成嵗年古書二三簡殘缺忘所傳中夜坐燒香微吟思至言身生堯舜後意在羲皇前隤然泯知識經時雪垂肩陳溪山先生留山齊春日賢郎來省具酒為樂某賦此詩齊居愧幽寂君子肯辱臨怡然推夙好曠懷明斷金席間奉容止朝夕副所欽春陽泛物華時雨流泉深户牖啓宿莽新衣振塵襟諸子共來省森如羣玉林嘉疏薦甘㫖芳酒逮朋簪伐木美嚶鳥鹿鳴歌野芩哀病晚聞道力弱嗟弗任詩書實世業冠纓匪斯今顧望羞龍斷汙潢溢蹄涔守約易循理足欲資陸沈仄聞太丘長率物由平心敢因先覺言發豫小人針豈弟朂明德鳴鶴方在隂病起謝陳溪山及齊中諸友良夜聽春雨清晨對晴昊沈痾適去體行庭寫幽抱鳴禽在嘉樹方池接生草扶策流水濵灑濯悅澤好幼稚勝犂鋤勤菑慎相保歸還讀我書聖言事探討親朋一時來藜藿薦行潦敬恭奉天明松喬不知老送㑹稽宰進士夏仲善㑹稽吾故鄉今喜得亷吏三仕彌固窮不愧親策士故鄉伊可懷西去草餘世清流繞修竹可想不可至知君垂朱紱吟嘯了公事還能探禹穴莽蒼思古始太守文字交僚佐足風致泛舟溪雪前列坐惠風次詩成可繕寫千里以相寄守白野達兼善也送豫章熊太古兼寄蘇伯修參政豫章有家學禮樂不見收為養不擇祿凄涼向炎州攬結桂樹枝誰為玉雪謀十年一再見我老君白頭古劍光陸離繫以珊瑚鈎激昂文史間未愧班馬儔蘇君天下士定價琳琅球江漢方渺然為我觀素秋長吟以相送明月在髙樓哀陳童子南山有鳳雛飛來上林樹秪承朝日輝不食秋夕露珠零海氣靜壁毁月光曙巫陽不能招荔丹滿洲嶼答胡士恭二首王母昔賜我一雙白玉環懷之四萬年恆在胸臆間偶因朝木公識之為開顔忽然化黃鶴飲食崑崙山漢武好神仙多欲心不閒所以至太液遂從白雲還鵬運候風信龍起從雲飛神物本無待感類相因依髙人服金丹質化識者希引睇貫霄漢倐忽歷九圍駕言清秋鶴同承太陽輝何期老鎩翮素心竟成違書昔人出入西廣詩後道路無險難征人多故傷窮愁一酌恩感舊忘他鄉九疑不能從二妃在瀟湘無以寫憂思吹笙為鳳皇宿紫極宫新樓野人入城府且就雲房宿東瞻蘇翁亭南望孺子屋相從總君子寒夜對明燭閲世如雲烟進道貴金玉取泉總持井烹茶武夷曲疏梅折髙枝蕭閒對晨旭欲寄髙軒人修眉逺山緑秋江亭白沙積髙雪有文見川郊華星垂光彩沈壁依潛蛟偉哉江海客結亭在其交流波散席上絶岸當空坳靈槎八月至垂綸向鯨鼇清露集衣裳嘉魚薦壺匏賔客醉白苧微飈激林梢次韻陳溪山送搖扇念我久坐雨貽詩逺來旬遙知治寸田隄防固嚴闉憂樂無嬰懷蕩蕩羲皇人自信知者希虛名非所親南薰待披拂感此時物新無由奉言笑泥塗滯周輪長箑豈手容招遙遺閒身受經浮丘伯老矣弟子申何以答佳貺執御從後塵火傳思為薪烹魚溉河濵贈喻仁本早從中州遊希孟實豪傑穹隆如喬嶽培塿謝􅑶臲侃侃買燈疏英主動顔色賢子瘞黃壤感痛詳朝玦朝遊長白春暮踏歷亭月慨然得終身屢召不踐轍兵闕關中飢特起救焚烈反𬒮傷道窮委頓成殞絶賦詩哭遺直好事為鎸碣爾來二十年江海鬢如雪每興故人思思道歎睽越忽逢喻先生江中倚舟楫久為濟南客山川類能說共言中丞舊流水助嗚咽更出中丞書嵗久字不滅交誼貴久要於焉見髙節問君將何之束書向京國豈無同門士簪笏在周列觀人以其主論薦共持揭敢為祿仕勤聊以誦明哲古人不可期長風起天末夢舊遊諸友三月三日午後隱几夢館閣諸舊遊存沒參坐陳衆仲舉杯相向曰旅甚思公亦知公之深思旅但不得見爾記得有詩六首其末句云萬死起俄忽只是一思憶是孟浩然作為是白居易豫曰殆是孟詩但不記得感動而覺是年夏聞陳亡隱几暮春雨夢見舊知識瑰竒秦漢刻墨本在東壁論辨如平時契闊增歎息就中東海生顔色殊不懌停杯不成飲執手道疇昔苦言孟浩然有句在胸臆萬死起俄忽只是一思憶題金陵汪尉雲松巢畫卷喬木多悲風卑枝安可居興懷有巢氏漠在邃古初浮雲無定姿溶溶滿堂虛脫身往從之一起千仞餘冉冉愁絶思悠悠隨卷舒白鶴千載來徘徊向匡廬乘蓋生紫烟捨此將焉如惟有南昌尉凌風一回車雲林圖雲林之髙風可望日出海君子居其間旦夕餐沆􅒭三年毛骨换九載神色改翩然升雲去鸞鳳翳五彩山中有神藥服食多所採寄語學仙子佇立以相待次韻二首昔者采芳草青春在中林三秀不並世日莫生重隂霜雪日已積萎籜日已深持獻雖無時豈忘事幽尋齊房多受釐垂衣正思欽霏烟散熏澤蘼艾非所任華英發貞本靈占係同心錫貢華未晚庭實生南金微根抱山石薪槱本同科曽不中欂櫨將置崇構阿終焉荷聖恩早休遂婆娑雪霜之所餘茯苓表垂蘿時能致佳士攜壺挂寒柯極目思逺道含情托清歌秋水不盈勺白雲豈其多結枝待幽吹泠然送鳴珂紀夢二首夢見二三子被服皆古人雲漢盛履舄山河儼冠紳言非世間辭靈一作虛音轉彌綸反思昔遺逺浩蕩不可陳睡覺日在樹空榻凝餘塵東南多名山衰病嗟逺道夢中躡虛空黃鶴為先導穹林冠晨霞逺水淡秋昊似在松喬間未覺黃綺老飢渴非所憂清露在幽草足痛吟寄費無隱足痛不履地匡坐畏長傲令人讀道書聊以釋幽抱修身身不衰此事聞頗早涉世得憂患時至遂枯槁茅簷苦聽雨更愁妨穫稻分當長飢吟稚子忽吾惱盈約固不齊受命自𤣥造東家種薯芋健步常為討況聞東海上旅生如瓜棗食之可不死所嗟在逺道親往未必能駕言亦非好嵗寒吟邑南有髙山隱者浮丘伯弟子逺來求千載奠仙宅蒼崖接天光旭日融五色永言托幽貞綿綿奉明德南昌昔將隱吳市遂不還兹土獨遺迭丹氣留空山噓潤被草木含滋及蜎翾相望世云逺雲中期妙顔蕭蕭松間雨夜靜殊未止青鐙照殘書白髮隱塵几園綺德不孤相持一瓢水如何在人境茅茨罕鄰里賦神蛙并序曹南吳生出神蛙相示𤣥石光潤其口目臂足儼然如生脊有文㸃腹若容受蓋真蛙也不知何自而化石焉有博物者能辨之貞女望歸夫穹窿化山骨飛揚洞中燕遇雨帖石窟古時蟾蜍精千載得仙術噓吸服元氣綿眇值通息形體雖尚存性情已非昔誤食至隂精返此太𤣥魄無乃書契初科斗抱殘墨猶與筆研交君子同几格幽光感星宿靈氣生倐忽慎爾韞櫝藏勿使蛟龍得錫圭神禹時因之問河伯道園遺稿卷一
