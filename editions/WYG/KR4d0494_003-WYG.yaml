body:
  text: 道園遺稿卷三元虞集撰七言律詩代祀西嶽畣袁伯長王繼學馬伯庸三學士二首紫禁沉沉曙色低奉祠羣使已班齊承恩歸院迷烟樹乗傳開關踏雪泥蹀躞共憐騎苑馬逶迤不若聽朝雞山川有事寧辭逺咫尺成都是國西棧道年年葺舊摧已将平易履崔嵬經行關輔圖中見夢戀鄉山馬上來諸葛精神明似日相如情思冷於灰重思親舍猶南國願託江波去却回自仁壽回成都還鄉思速去鄉遲王事相縻敢後期里父留㸔題壁字山僧打送捨田碑胡桃笻竹南方要盧橘枇杷上國知此日君親俱在望徘徊三顧欲何之題王庶山水蜀人偏愛蜀江山圖畫蒼茫咫尺間駟馬橋邊車盖合百花灘上釣舟閒亦知杜甫貧能賦應嘆揚雄老不還花重錦官誰得見杜鵑啼處雨斑斑張道士蜀山圖碧玉參天是蜀山舊曾飛度歴孱顔松風上接空歌外蘿月長懸合景間試劍丹崖秋隼疾濯纓清澗夜龍閒君家虚靖歸來日冉冉蓬壺為憶還范文正公書伯夷頌二首并序伏承主奉范君示先世詔及文正公手書伯夷頌令集題識仰惟前賢爭光日月不敢妄有贊述輒以鄙句奉謝用表惓惓景慕之意云慶厯元臣細字書清風直與伯夷俱潞韓並識何舂應秦賈爭藏實衊汙神物䕶持天愛寳子孫驚喜海還珠敢以微塵讚喬岳願推餘砭及頑夫企仰前賢嵗月深阿衡事業伯夷心義田猶是當時禄遺像能令百世欽竊頌詩書求彷彿黙嗟人物轉銷沉誰人浪漫矜家世㸔取天平萬石林拜歐陽文忠公遺像知公難遇已當年况復瀧岡十世阡金石舊藏存刼火丹青遺廟祀鄉賢終身未必慙韓愈作者誰能繼馬遷鳴鳳不聞驚嵗晏長懷清潁一茫然輓文文山丞相徒把金戈挽落暉南冠無奈北風吹子房本為韓仇出諸葛安知漢祚移雲暗鼎湖龍去逺月明華表鶴歸遲何須一作人更上新亭望大不如前灑淚時從兄徳觀父與集同出榮州府君宋亡隠居不仕而殁集來吳門省墓從外親臨卭韓氏得兄遺蹟有云我因國破家何在君為唇亡齒亦寒不知為誰作也撫誦不覺流涕因足成一章併發其幽潛之意云我因國破家何在君為唇亡齒亦寒南渡豈殊唐社稷中原不改漢衣冠温温雨氣吞殘壁泯泯江潮擊壊欄萬里不歸天浩蕩滄波隨意把漁竿興聖宫朝退次韵袁伯長見貽是日上加尊號禮成告謝集即東出奉祠齋宫翠盖重重寳扇斜從官穿栁散慈鴉過宫路逺紆天步上壽杯深閣雨花玉貫兩虹通象錦衣成五綵練雲霞奉祠東出蓬萊道春水鳬鷖踏漢槎朝廻和周南翁待制韵三十六竽吹鳳皇九重春色絢天光卿雲㣲動旌旗煖湛露初稀草木香貝葉神師東度嶺金輿馴象北浮洋小臣職在歌功徳拜手陳詩對日長挽歌辭中天太白貫晴虹頃刻龍飛返上宫萬國共賔暘谷日羣臣忍把鼎湖弓潛蕃回首金山逺顧命傷心玉几空聖主巳頒哀痛詔蒼生有淚灑西風和李秋谷平章小車詩雪晴宫草隠晴沙相國朝天試帝車班馬晝移温室樹鳴鸞晨度掖垣花搴帷每命賢俱載趣駕頻煩使至家此日龍門誰執御擁紅正履侍金華送朱伴讀南歸仁卿喜子南歸盱水上經過為我問臨川㡬家橘柚霜垂屋何處蒹葭月滿船應有交逰憐逺道試從父老説豐年寒機早晚成春服一一平安報日邊送李通甫赴湖廣行省都事黄鶴樓前江水春江花飛接渡江人日長青瑣文書簡雨過滄洲杜若新應共庾公揮扇坐每尋崔顥賦詩頻三公舊掾多為相行見廻車載繡茵畣周伯輝翔鳳百酌宫壺醉曉霞望中鴻鵠盡天涯故園賔客千金賦飛燕尋常百姓家上國春深花滿眼河陽市上果盈車古來鐘鼎多憂思待得人間兩鬢華伯輝北山堂北山有萊中作堂樂只君子不可忘紫氣常占少㣲下壽星今在長沙傍佳哉競秀五男子少者逺客諸侯王執筆題詩嗟未敢杜陵之祠烟樹荒柬鄧善之山雨不來喧靜夜江雲猶為䕶晴朝一羣青雀墻花老㡬個黄鸝苑樹遥何有深心期管樂獨無髙步接松喬未能徑去成飄忽且可相從慰寂寥用退朝韵奉懷伯長試院乆别藝闈羣䇿手封斜徧閲縱横墨濕鴉拜賜頻酣千日酒思歸寧惜少年花此時吟詠齋宫曙同是瞻承絳闕霞想有小團分學士好将新水試浮槎送髙尚志下第歸江西清霜木葉水多灣知有荆人抱璞還龍擁湖波迎月下豹乗雲氣候林間殺青汗簡三冬足生白虚齋一日閒㑹望斗牛尋寳劍春朝佩入紫薇班題李道復所作艾全真乃父墓銘道人何處京城中擬託斯文壽乃翁萬里烟塵惟兩屐一時製作見羣公江湖所過蛟龍識金石他年物怪通我憶廬陵多舊事瀧岡阡樹足秋風次韵三首春去園林百草生千源流漲到池清心期自與浮雲逺鬢髪新如積雪明白苧寛裁無束帶黄冠小製不垂纓故人相見那相憶但聽横空鶴數聲丹閣岧嶤地最親頻年染翰侍嚴宸九疑鳳去荒烟外三月鵑啼野水濵日落賈生将去宅江迎庾信獨歸人五湖不逺閑身在扶杖風前詠暮春今代廣文真畫師蘓州把筆更題詩白雲逺海意蕭散明月滿樓光陸離積妄已空前日夢清狂那憶少年時老夫獨感深相慰盛徳加餐報祝規眉菴自賦二首新春名字合更新偶託眉菴作主人本不求妍何用妬從來無悶豈須顰曉對逺山烟冉冉晚臨流水照􅉿􅉿成都畫手應無數憑仗他年冩得真憶自當年學畫眉畫成何意望人知鑒觀水影真無愧接對天光豈有私獻笑豈隨桃灼灼效顰應許栁絲絲菴中妙用何聞見未及東風賦紫芝次韻寄謝魏雄卿録事表兄短棹移家竹樹東曉鬟擁翠夜鐙紅誰為重客投卭令徒有髙堂舍盖公白雪上鬚無藥染絳霞盈頬已樽空憑君莫笑黄花冷自有清吟與客同和偰世南除西臺御史鳳池共愛十年身一榜今為七爭臣識字觸邪誰與敵讀書知律自能神闗中多少遭逢甚輦下同年聚散頻萬里玉門歸控制向來投筆亦儒巾游岡子原呈王學士岡子原頭春色濃小車晨出㸔東風雨餘林潤人烏好日煖沙平我馬同西引峰巒來座上東瞻樓閣一作觀起天中詠歸莫作匆匆晚儻解相逢擊壤翁次韻寄元復初二首木落天清悲素秋故人何處海東頭尊前夜月仍留户天際浮雲重倚樓影靜梧桐餘倦鳥眼明洲渚自輕鷗人生㑹合真堪惜長憶春風從兩騶黄粱夢覺人千里白璧歸來月一缸尊酒㡬時忘北海束書無路到東牕卧龍宛宛氷生壑飛鶴翩翩雪灑江無限心期總寥落秋風烟樹引歸幢次韻馬可山人見招二首天意茫茫故可知無端感慨又先之百年開濟輸前輩萬里登臨在此時袖手㸔雲歸去晚舉頭見日坐來遲忽聞八月靈槎到欲及西風理釣􅁝愛此髙槐十畝隂偶來相對理瑶琴江湖有夢扁舟逺風雨無人陋巷深濁酒竟成終日醉花枝聊學少年簮若為後死乘雲去爛漫銷除感物心次仲章韻二首日射飛塵下界昏遥瞻積翠是君門鳳鸞天上今何夕雞犬雲中第㡬村瑶草無人能逺寄玉天有道可長存晴虹東去連滄海儻遇安期與試論深屋古仙䨇碧眸淵淵玉色象春浮上方烟霧日千變清晝風雲時一游傾耳松濤惟立鶴廻頭塵海不藏鷗飛飛㡬欲吹笙去千嵗歸來恐更愁無塵道人雲霧為衣月作裳天壇獨自禮虚皇龍収古劍沉秋水鶴識神丹起夜光金井有聲惟墜露玉堦無色乍凝霜無端下界松風動又欲飄然上鳳皇和上都華巖長老見寄二首講帷秩秩退晨朝咫尺東方寳月遥湛露甫承天子賜慈雲還赴梵王招毗耶一日香薰普瀛海羣公意氣飄白􅄠故人非玉局敢将詩句畣㕘􅋁上帝曾承絳闕朝屬車日向寳城遥生公屢講中邊味宋玉空吟大小招梵網千重隨鏡現天香八月向風飄手開樓閣能來往常候晨雞碧海􅋁和斷江恩上人緑松見貽之句誰将古色伴幽悰百尺長松對一翁子落雨餘棋局在影搖雲際水瓶空倚藤老大何惆悵覆地隂凉待欝葱挽著萬牛須晚嵗手開樓閣五雲東題了堂悟上人溪聲閣磨衲歸來閣倚坡池開半月引泉過蒼龍入鉢斂風雨白象捲湖吹浪波宴坐不眠花寂寂飛行無跡竹娑娑廣長舌相何時了未覺游人一偈多賦松濤齋曾游海上聽松風積雪千峰水接空細若鳳箾䨇嫋嫋雄於鼉鼓萬鼕鼕玉堂夜直蟾光裏銀漢秋横劍氣中欲截斷槎乘浩蕩兩樵相對此時同賦雪洲江上經年積雪多長洲化作玉坡陁舊時射虎迷蹲石薄暮歸漁認擁簑河伯作宫龍獻璧湘靈遺珮鳳停梭鳬鷖容與江花發更待春來生水波送茅秀才歸茅山茅君兄弟茅山裏㡬代曾孫骨尚清傳得元經還自讀餌将蒼术不須耕鶴隨雲氣來金闕鳳合風聲度玊笙為問仙郎老仙伯書來應許學長生送韓伯髙浙西僉憲五月樓船過大江海風吹雨灑船忩雲銷虹蜺横山閣潮落黿鼉避石矼闕下諫書誰第一濟南名士舊無䨇湖隂暑退多魚鳥應勝愁吟對怒瀧寄馬叔惠福建僉憲荔子枝頭火齊紅髙堂紈扇坐薰風湘筠簟冷魚波合海栢梁深燕雨通絡緯豈知秋袂薄扊扅長憶曉餐同禁城來㸔花如錦誰道清霜觧惱公題故太子少傅翰林承㫖李野齋幽居圖車盖歸來托逺林魯山􅍶崒魯原深漁樵相識頻分席賔客時過共賜金百嵗儀刑猶近古五朝文物至於今披圖想見登臨地松滿徂徠起夕隂奉元王氏孝義詩隂隂榆栁䕃韋村中有烏頭孝義門耕織事均家益贍絲麻親盡義彌敦蜜蜂日暖開忩户慈竹春深長子孫先世此邦嘗賜履為歌遺俗却銷魂賦張志甫八十身閲昇平近百齡顔如玉雪鬢如星逺移湘竹堪扶老舊種蒼松已茯苓頻見大官躬致饋蚤令掌故口傳經古來名士多肥遯徧與題詩歴下亭送道士危亦樂歸臨川并序予寓居臨川三十年而隨牒京師之日過半愛其山水之明秀而未盡游也喜其風俗之馴雅而未盡觀也樂其人物之修整而未盡交也然視臨川則為故鄉矣以其視之也切故其懷之也深故見其人則喜遺其人則若失亦人之情也况為賢者乎驪塘危氏臨川之望族文學雅正之士世世而有之故予所謂不得盡交者也亦樂危氏之俊彦也學道上清山中以翹楚見稱信乎名家子孫非常人所可及往年亦樂之從父曰虚室君與予最相善虚室歸江南予嘗送之曰落花如海思歸夜剪燭裁詩又送君觀乎此其風致盖可想見于是十五年矣則亦樂之行予獨能無言以叙其懐歸之意乎予且歸休将從子於江湖之上周覽山川而歌詠其風俗以託諸其人焉尚未晚也叙而繫之詩曰上清仙子臨川客蹔入金門即賦歸夜月㣲聞䨇玊珮香塵不染五銖衣從游元圃暄風暢坐讀黄庭墜露稀華盖風前如覓我應㸔白鶴向西飛送張用鼎還鄉張郎兄弟人皆説二陸才華未足多騏驥西風開道路芙蓉初日照江波周官雅頌賔興禮漢代偏崇茂異科為語州人胡處士清時何故覔漁簔題大都香山寺圖香山蒼翠帝城西古寺髙飛北斗齊繞屋清泉龍穏卧對簷老樹鳳長棲曾陪退相㝷山徑亦共幽人躡石梯忽見畫圖驚十載春雲秋雨不勝題為馬竹所照磨題香山圖古寺深沉壓巨鼇畫圖重見記曾遨曉城宫闕烟花合夜壑風濤樹木髙雨靜卧波䨇劍影天清歸路一鴻毛東都九老名猶在瀟洒誰同白紵􅂁端午節飲客與趙伯髙龍沙氷井夏初融簪筆長隨避暑宫蠟燭烟輕留賈誼銅盤露冷賜揚雄南村久病思求艾北客多情問轉蓬忽聽滿船歌白紵翻疑昔夢倚春鴻用蕭性淵詩一句足成一章送常伯昂華盖芙蓉入座清清雷踈雨過虚庭永言自媿難傳世急就成章易滿屏好客無情憐白髮幽人相顧説丹經簞瓢便了餘生事空枉輕車到野坰題時録判齊山吟巻濟南名士古來多此地登臨孰有過山影蘸湖春雨樹泉流滿郡晚風荷客生江國猶思憶人念鄉關想詠歌千古齊山青未了李邕杜甫奈愁何王真人眉叟在京上都賜酒唱和真人燕處自髙堂逺賜宫壺出上方給傳許乘飛廐馬侑樽仍有大官羊一天雨露凉如洗四座賔朋喜欲狂起賦新詩誇得意西風傳送及闕送張伯雨入茅山二首獨棹扁舟入白蘋隠居舊宅去棲真囊懸肘後惟丹訣書到人間稱道民未覺白雲留住晚也應蒼术寄來頻手栽松上孤飛鶴知是華陽第㡬人隠居聞道無人蹟麋鹿來依積雪深每占雲氣得芝术莫怪丹光穿樹林茅君自騎一虎下木客或與羣猿吟知爾此時最相憶遲予飛屩度千岑次韻熊太古題金石編上林昔見衆芳來春雨湛涵詠有萊何處北山留客住未聞東閣為君開畫須具眼方留迹琴有知音不用媒多學少成多老我每㸔精義欲成灰次韻錢翼之冩大學衍義局中詩卷貝葉西傳凈業塵泥金萬軸等長身清閒邃殿仍稽古寂寞遺書亦發春承詔外庭須老手揮毫仙館屬才人重觀舊事思天上白水揚雄野水濵題王本齋歴官紀年畫像歴官貴與年俱進列畫衣冠若弟兄出節遺風仍鎮海生祠嘉樹各專城丹心不改兼終始白髮微添更老成清夢㡬時求傅説平時早合識真卿謝僧以長送銅龜水滴贈我銅龜盛硯水想君久已伴題詩斑斕隠約知千嵗繅藉丁寧愧妙詞豈有文章須潤色况能經濟屬論思祇應六月俱忘息灌沐清泉自奉持題靜壽道人自誌後對雪鼓琴張道士八十二嵗顔如春世外異書聊過目人間樂事自終身如如常住誰為死擾擾相仍故是塵知爾既忘欣戚意安排何用賦詩頻挽危公逺道士剪燭裁詩憶送君落花如海政繽紛㡬廽分别未為老一日音容杳不聞珠樹露寒蝉委蛻玊樓風急鶴離羣自吟新句成竒䜟只許人間禮白雲與筆生聖明天子御奎章翰墨昭回日月光畫殿風微䨇鳳翥春池波暖六龍驤侍臣近榻誇先得内史開函喜自将借問紫毫誰所製發揮神化未渠央白雲閒上人以橘一枝見贈予作詩以謝洞庭嘉實龍興種百顆同枝重壓簷折遺忽疑千樹盡分嘗猶足十人兼貢餘沾賜今難得霜後題詩尚可添只欠吳姬團錦幄霏香噀霧玊纎纎答舒真人送牡丹二首真人棋罷小徘徊手剪忩前紫綺來天女不嫌雲霧薄洛神親擁髻鬟堆已令老鶴婆娑舞更注清泉瀲灔盃莫遣巢翁知盛事詩筒日日片雲催曉來睡重不聞鐘仍嘆㸔花似霧中貪賞金盤承宻露不知玊樹倚春風戰酣淮水碁應勝雪擁藍闗句更雄欲畫新圖宜正午須憑貍目騐芳藂送胡古愚仙館醉餘千石酒上林吟遍百花風拾遺徒歩頭成白供奉歸來錦更紅晚下紫薇憐病鶴春風緑水送冥鴻故人江上如相見為借扁舟候秃翁游小姑及彭浪廟承學士命以示畢推官因次韻二首天作孤岑自㡬時髙危並見古人詩身當委注下無底影絶旁縁終不移波浪秋隨天漢淨風雲未盡海門馳釣竿拂樹思長往應有沙鷗已得知廻舟却往彭浪石還藉枯笻得自持外險内安闕者樂東流西洑渡來知追隨過客應無事迎享神君遂有詩消得清秋好風日經邱㝷壑昔為誰送栁唐佐懷孟總管滿縣花開二月初郡人日望栁侯車醉翁白髪詩情在好客清言吏事餘河水煮魚頻入饌柿林収葉徧留書欲從太守借盤谷手自搴茅結隠廬題李息齋竹二首文翁冩竹鬢成絲不作茭蘆與栁枝日色分明見真本天公端的是吾師動搖如有禽相語偃蹇惟餘石不移靄靄春雲好才思千姿萬態總相宜已學夷齊願息隂如何逐日轉蕭森發揮自出形容表摹冩誰知造化心持贈不堪憐苦節卷懷無迹愧幽㝷更㸔月夜風塵定着意沉沉落墨深題先天觀畫來新搆先天觀便欲工吟勝畫師山挾風聲雷起陸水涵天影日當池長生有道行行到生處無為了了知不是三年不題句巻中為有范梈時次韻雲章丈欲訪徳機學士故以末句相屬兾以因行致之風雨相求越一邦無多苗藿庶充腸東風吹雪開梅蕚南斗無河避劍光力薄薦書空汗漫情多愁􅄠易蒼浪故人范叔清秋鶴誰共吟詩月滿堂予與胥翁亞仙自劍池觀山水遇客石橋吳氏訪自牧長老於昭福時寺新成方卜門向予與亞仙皆以正對大羅為妙一時同遊約齋朝輔朝佐皆吳氏之良而牧亦吳出也莫不共贊其美因為賦詩以識之重卓招提坐石溪開關更欲面羅池西來萬𣲖分明意前列諸峯蒼翠姿脩竹踈松通一徑㣲雲淡月立多時千年白鶴重來晚觧向児孫話祖師去冬過昭福留詩溪上牧所既而蒙半村先生與國賔茂才青雲諸名勝相繼屬和盛意不可忘也先從牧翁寄此尚須面叙區區也隱居曾見繞清溪屋上青山屋下池老子風流宜白􅄠阿戎翰墨稱雄姿每懐髙閣㸔雲後投宿比隣聽雨時安得青藜同照夜題詩寄惱牧牛師贈丹士神仙有詠煉丹砂服食三年鬢不華自有錦囊収曉露何妨玉椀泛春霞倚松吟嘯風生袖採藥歸來月滿沙肘後方聞多至劑青粘何日到山家題朱澤民畵松外浮雲過眼空前瞻無際後無終㡬畨白雪經行地數尺蒼髯俯仰中健筆祇今韋偃老吟詩誰似杜陵窮悠悠無限滄洲興問取騎驢傲兀翁題董生畫李公昔守清江上翰墨交游有稚川每從逺海風雨至共對小山松桂眠撥鐙何處得古法臨池忽欲無千年嗟哉李氏孫尚㓜川翁家學子能傳羅若川畫松暮春多雨晝冥冥羅生畫松當素屏老蛟化為劍氣黑白鶴下啄苔痕青傳來日暮自篝火夢入幽巖㝷茯苓不遇胡僧露雙脚石函自了讀殘經又次游仙游山詩韻巃嵸山木小軒東梔子花開鼻觀通嘉節喜逢風雨外幽懷多付笑譚中詩成彩筆從人冩醉後朱顔與衆同却怕有人知此樂枉将山水繫愚公董掾湖山堂九江秀色何處好新堂正值甘棠湖春水初生蕩洲渚晚風欲起散魚鳬自公退食對脩竹教子讀書編緑蒲知君亷恕足隂隲行見髙門紆紫朱留上方道院卜隱山中事已遲歸來無處着幽棲行穿深谷却車馬借宿髙齋慚黍雞茶為彌明分石鼎燈從太乙借青藜百年身世半塵土一日林泉何足稽寄陳湛堂法師月宫桂子落岩阿想在林間閲貝多持足地神衣拂石獻珠天女襪凌波香因結願留龍受水為烹茶喚虎䭾寄到竹西無孔笛吹成動地太平歌送胡士恭十年京國擅才華宰相頻招載後車太液蒼涼黄鵠羽元都爛漫碧桃花三清風露仙人館萬里烟塵野老家拂拭舊題如隔世華星明漢望歸槎送霜林西白長老用太白起句峨眉山月半輪秋我憶家鄉亦白頭脚踏岡源流去水身隨海岸到時舟長空一鳥飛無迹白雪千峯爛不収却笑坐來銷刼石雲興百闕若為酬寄白雲閒上人龍興寺裏白雲房不到于今二十霜橘柚向來垂屋重松筠此日過人長千函秘典心源淨百嵗長幽頬香若念尚書舊行履三生石上莫忘鄉寄訢笑隱垂手毗耶憶舊勞諸天幢㦸擁林臯開軒坐見青松老倚閣間㸔白浪髙曉日上林隨步屐春雲如海在揮毫經年不得江東信獨立長春送羽毛陳君璋新園池亭得烟雨横塘舊扁表之本漁埜陳氏之物我大父尚書公所書也尚書書此時巳九十年而君璋之父年且九十矣故賦詩及之二首烟雨横塘識舊題尚書遺迹久凄迷㡬囬玊樹鶯聲曉曾見雕梁燕子泥近水樓臺隨地起臨堦楊桞與雲齊小車却憶堯夫老徧洛㸔花信馬蹄舊扁横塘墨色新百年還屬百年人爭墩正為名隨謝隔世何妨姓共陳綺席聞鶯垂故舊金盤烹鯉亦賔親蘭亭俯仰興懷地莫惜流觴對暮春題蕭正肅公及尚書與楊誠齋書幅後古木蕭森日月懸六丁猶為䕶遺編一門翰墨三千首七世風流二百年秋野蒼茫麟角出春池零亂鳳毛鮮世居鄉里如君少西望孤城憶墓田費無隱丹室碧雲䨇引樹重重除却仙經户牖空一徑緑隂三日雨數聲黄鳥百花風年深不記栽桃客夜靜長留賣藥翁㡬度到來渾不語却依秋影送冥鴻冩韻軒翩翩仙子藥王山明月髙樓遂不還天外脩眉塵鏡掩忩中遺墨夜燈閒雲深黄竹歸無所雨暗蒼梧淚更斑何似浮雲相遇合杳然遺跡謾人間楊判官春雨亭松栢園亭雨露新慈顔幽翳倍傷神三年蔬食心長慕一勺寒泉淚滿巾孝子舊游多國士将軍遺愛在邦人封塋近對清江曲世世能來有鳳麟揭北海山雨亭周遭城郭擁陂陀北海亭中逸興多木落秋風知地逈水髙春雨見帆過華簪列坐知年老翠袖深盃為客歌説與蓬萊千仭石誰能鳴鶴倚松蘿珉上人俯清軒髙亭直下一江清千尺絲綸寄此情秋水芙蓉華月上春苕翡翠晚風輕坐來古硯生雲氣吟過長廊曳履聲知有登臨無限意髙山野水已相迎楊伯恭桞隱山房細栁誰如㶚上營清江百尺坐專城陶潛雅興還堪賦張緒華年更有情春日貫魚多鱮鯉秋風飛羽總鯢鯨錦衣玉帶催裘馬入對長楊聽早鶯揭北海蓬萊亭太湖石峯海上飛來第一峯華星明月五雲中千年持載遺神物九仭飛騰接太空不與興亡驚世換長隨山澤與時通蒼茫獨立横秋氣未許西山得比雄秋屏閣㡬度秋屏真謾興嵗寒今日一凭欄西山廬阜連天起彭蠡番陽學海寛久病豈能修客禮舊時長感奉親歡老身若借雲房宿卧起江山正面㸔王欽道活水源堂江上曾聞感聖衷㝷源因見出泉蒙風霆流動千門啟山澤髙深一氣通潤物已從時雨化濟川猶歎昔人功野塘舊隱誰能住一夕清凉謝太空題送林松磵照磨詩卷後朱輪豪傑早知機一日冥鴻向海飛風雨交游無舊迹江山幕府有清輝秋空淡淡蒹葭浦春晝堂堂錦繡衣世上喬松中梁棟澗邉莫嘆故人稀御風亭城隂百畝轉廻塘喬木㕘天翠桞長飛盖曉迎花霧氣臨池春動墨雲香衣裳清露芙蓉淨劍佩明河水玉凉還向人間留妙蹟蘭亭列坐詠流觴䨇檜軒詩并序檜之為木仲尼嘗手植於魯天下後世莫不具瞻焉學者之於聖人宜無所不學江右憲使覃懐李公重山甫持剛方之節秉貞固之操乃樹䨇檜於家庭以自見盖将景仰先聖於萬一也夫木之為世用多矣大材成大器小材成小器椅桐梓漆則琴瑟之儲焉清廟明堂之棟梁非檜莫與也尚論聖人之所為識其大者豈非君子之志乎乃為之賦詩曰素王舊植魯宫墻䨇樹新隂接太行氷雪髙寒今節操雷雲參錯古文章河津此地營舟楫廊廟多年待棟梁㑹與羣龍近華盖九天朝日正蒼凉黄仙巖鐵色隂崖積石屯玉顔窈窕鎮崑崙上池降液作靈響左角出雲承曉暾手抉風雲穿月窟坐當星斗直天門昔人政有懷仙地為挹清泉注一尊古亭詩為張仲淵作濟南名士古來多誰作新亭照水波百頃髙荷秋興濶一朝明月暮船過南州城上登臨賦北海尊前感慨歌况有吹笙王子晉清風千里接鳴珂觀畊詩為王可敏作昔嵗春畊見夢中分軺此日嘆民窮漸帷草色經行路輟食棠隂問土風歸鴈相催知日近占魚猶願報年豐他時緩歩從青瑣寤寐難忘稼穡功與熊天宇去嵗送花無處栽至今鄰舍借園培縁籬正要帶刺枳並屋還須叠葉梅桑椒墻下堪食用桃李門前空綻開故人一一可致此他年相對共銜盃行丞相掾唐仲英事母至孝在臨川時太夫人常藝蘭於亭中花繁茂累嵗增盛異於常植君子有以占其子孫之興也他日太夫人去世而蘭亦悴而弗華三年而忽榮如太夫人在時仲英感嘆如見母之存焉都人士咸以為瑞相率為歌詞以頌太夫人之遺徳而識天錫瑞以彰仲英之孝後數年虞集在豫章與仲英續賦一章云唐氏慈親手種蘭三年憔悴復闌干為懷媚服慈顔喜豈意空帷帶淚㸔手把桮棬春露重心知佩䚢暮天寒扶踈玉樹情何極長繞幽芳不忍㸔憲府瑞栢憲府清巖翠栢髙香烟霏霧起亭臯濃熏旭日新膏沐細引春風近羽旄黼黻成文如錦繡丹青生色在揮毫徳星占應賢人聚濟濟清朝見譽髦書蕭母傳後并序新喻蕭母有貞節朝廷有魯㕘政子翬言旌表其門莆田陳旅博士為之傳文甚竒子翬早學於蕭氏陳集友也先丞相雍公與蕭正肅為同朝故其家來求題云桓桓蕭氏貞門表猶是前朝執政家恩詔傳言褒素履安輿垂淚對黄華賢孫能奉髙年逺薄俗寧知古道賖魯氏交情陳氏筆臨安三感一長嗟黄節婦詩并序集昔沗館閣四方孝子貞婦之事來上朝廷者率求詩文以表章之隨事發明時義既有所諷勸或所録未甚備者猶推其類以著其姓搢紳樂善成風每盈卷軸不以詞為費也今觀雷尚書之諸孫長仁書其女弟適黄氏貞節事皆閨門變故而始終一徳非其兄不足以知之非能文不足以發之集筆硯荒落長仁之子以此卷相示感而賦之貞婦初年遘百艱每将忠厚對傷殘死生家世心無愧終始閨門義所安信有髙風隨地化不營華表與時㸔賢兄述徳皆真實為報鄉人在史官送阿里仁甫舟中作送客江邊醉似泥漁村留宿已雞栖風平山影搖舟檝雨急灘聲入鼓鼙故老别來誰尚健新詩吟罷更重題却因農事催歸去卧㸔浮雲逆上溪題髙彦敬竹石踈篁幽草澗邊生羣玉參差若弟兄更待拂雲棲紫鳳何年臨海掣長鯨尚書蕭散今摩詰子墨凄凉舊客卿風雨夜來家四壁龍吟㣲應讀書聲南浦遐觀圖房山避暑何王宫古木蕭森多晝風平生江海毫素裏日暮鄉關魂夢中孤雲斷處更野水五絃揮罷又飛鴻髙情千仭一倚杖莫怪尚書䨇眼空古木圖晉人筆法成中絶竒傑縱横見米家手畫斷崖分鐵石意求古寺帶烟霞龍髯觧出空中雨鴻𤓰能留雪裏沙近日尚書髙彦敬髙懷尤足共清華趙伯髙所藏髙彦敬吳山夜景圖呉越蒼茫咫尺間尚書能畫夜㸔山塵銷海市露初下雪積江沙潮始還座上賦詩誰絶唱夢中化鶴忽臨關髙情已逐年華去秋樹寒波共妙顔東山圖大傅東山杖屨行總将憂樂托髙情獨擕窈窕開瑶席䨇引娉婷韻玉笙春雨松間殘奕冷秋風江上暮塵生三分籌策煩勞甚愁悵雲霄一羽輕百馬圖楊栁生烟草色薰川原錦繡動成羣百年海宇無征戰一幅圖書有見聞日夕吹笳歸别部天寒挏乳奉将軍當時校獵誰能賦白髪揚雄思若雲周昉畫島上雲生日轉簷海風吹雨暮寒尖春明玉色遺薌澤夜定珠光入鏡奩織得鴛鴦隨緑皺教成鸚鵡啄紅甜試令鼓瑟應無語目斷歸舟思未淹天師菴壁間墨竹憶昔卧遊脩竹地當林日日㸔春生白雲來時衆仙降皓露如㵼松鶴鳴吹笛江深星斗動釣竿樹老浪波平何時置我北極下獨倚髙壁聽秋聲從子旦欽賫賜金至山中次陳溪山韻槖金萬里來天上舊賜新頒捧拜餘去國棲遲慙補報榮家歡喜度空虚孤臣清淚三生夢一寸春隂數葉書更買青山可終隱不妨投老得安居謝予棕雨笠歸弄江波自濯纓白頭徒歩闕陂晚夏木清杜甫闕詩更瘦逺公闕野僧三四同來往此日先生戴笠行題毛秀發薛元卿戴笠圖卷後偶然戴笠過前山天賜髙人一日閒薄有人情闕無名姓在人間毛公吟罷龎眉古薛保闕羽還無限好懷闕松雲千載為誰憐止家人製衣故人遺我布单衣寒暑相仍服不違地僻少塵撋澣易身閒遲破補紉稀樵漁總識㝷常好魚鳥相忘作念非請㸔江頭木居士雲來雲去本何依荒唐齊人野語楚荒唐野死幽囚秖謾傷往往闕文誰復及悠悠没世豈能忘百年有道開新盛千古遺言發耿光不有鳳麟同日至誰知信順見文章虚齋誰識空中有至真一庭芳草自生春風雲變化閑來往日月揮持在主賔寳劍有神凝鍳水金丹無質現忩塵忘言本是吾齋事莫負空同問道人真止軒乾坤定位易行中星拱辰居象亦同終日有言寧離此先天無事若為工音聲倡和黄鐘始闕浮沉土釡空世法定無相比並閑循斗柄玩東風石巖詩為道童總管作維石巖巖氣象超俯憐培塿獨岧嶤八風不動盤坤軸一柱髙擎切斗杓江郡暮雲留逺樹湖隂積翠上春潮便應從此為霖雨直向中天絳節朝竹所詩為馬照磨作蕭蕭脩竹倚闌干幕府髙秋獨坐看龍化欲隨清佩響鸞停長共碧梧寒㡬年氷雪培根節一日雲霄見羽翰聞道武公方壽愷永歌淇澳報平安送揭子尚之京師縣北之亭山水幽玉堂故人懷昔遊錦囊五色起雲霧華衮一字驚林邱賢材洛下共青瑣久客襄陽成白頭羊公沈碑聞近出文章垂世何悠悠送李伯儀老來多病山中住誰復能吟過客詩賈誼豈無前席夜終軍當有棄繻時沉香亭北花圍錦太液池頭栁舞絲初到長安還有賦東湖傳㸔緑漪漪送吳志淳古道棲遲與世違髙才誰可共襟期揮毫妙得中郎法倚席長吟老杜詩澹澹春風湖水詠蕭蕭夜雨竹枝詞明年何處還能賦驄馬金溝結栁絲送劉仲禮遊浙於今南斗聚文星愽士空慚老復丁杜甫文章驚四海中郎字畫尚羣經才華酷似泉流峽書法親傳劍出硎欲㸔海門潮始壯髙風鳴鵠舉空青送艾有文之靜江桂林賔客舊多材鼉鼓逢逢夜宴開鄉里共推文學貴轅門爭識故人來幕中草檄狼烽息座上吟詩雁字回為問伏波天柱逺文章何日刻蒼苔送太原郭詵還豫章灌園精舍讀書每思有道太原碑復憶南州孺子祠但得賢人千里聚奚傷大樹一繩維生民憔悴依髙節吾道銷沉繫逺思誰向灌園棲隠地下帷觀象玩㣲辭送劉元補淮南漕司書吏江南大郡多凋瘵三月鶯花海上城使者自持清節重書生逺去一舟輕圖書雲靜滄洲雁翰墨風生碧海鯨幕府從來賔客盛鳴琴時自寄髙情送李仲淵雲南亷使海上瀛洲想玉珂繡衣今歴㡬坡陀賢人㑹合何其少蓋世文章不用多蘭楫誰迎桃葉渡蘆聲莫奏竹枝歌不令駟馬歸金馬奈爾相如好賦何送僧歸俗孰謂儒冠多誤身昔年聊作小乘僧春風花影踈踈月夜雪松濤澹澹燈巾帶便須歸賈島衣盂從此付盧能男児今古平生事未把丹心一寸冰題河東李集賢倜詩後并序某與昭徳别二十有餘年相見清江之上出故集賢李士𢎞學士重游舊詩蓋李自守郡至作詩時已二十餘年今去李公賦詩時又㡬三十年矣俯仰感嘆追和附卷末云郡人長説使君行室有絃歌野有耕千丈沙堤春雨漲滿舡書畫晚峯晴重來城郭誰耆舊徧刻文章自姓名我亦從遊今白髮每懷冠佩望蓬瀛聽劉元彈琴并序劉元相訪竹齋清夜為予援琴作長清飛佩等調宛然二十餘年前聞諸四明袁公伯長父子及巴西鄧公善之之子慶長者不勝凄感道士張伯雨亦偏善此相别亦二十年矣寥寥此音在天地間何可斷絶賦詩冩懷書贈元云耳寂寂虚堂月上遲劉郎為我鼓氷絲秋聲在樹誰能賦夕露沾衣有所思荷蕢過門良久矣乘桴浮海欲何之呼童明發酬佳興三勺清泉饋石芝陳立持所畫山水及酒饌來求詩法詩法無之得與齋中朋友一餉之樂拙踈生理歎衰翁食粥何妨甑屢空驚見殺雞供季路喜㸔載酒問揚雄畫圖乞與千山雪詩法傳來滿袖風令子讀書誰得似髙閒甘㫖不憂窮與趙伯髙論詩莫道幽人有意吟縁情生變若推㝷竒雲映日書成字靈響盤空譜作音春鳳雝雝天廣大秋蛩唧唧雨隂沉性情平澹随時見禮樂何人繫古今宿周氏東齋聞饒以和李本夜話賦此霜月髙齋㑹兩賢夜深情話極幽𤣥退藏莫作神明化通變猶聞典禮傳五十年華思絶學二三良友信遺編選鋒若欲驅殘臘晴昊梅英孰與先觀王繼學㕘政贈臨川艾庸詩有感世儒退相淮南使羡爾華裾早及門授館終年歸白粲探囊一日試黄昏漢廷議禮諸生起魯壁藏書㡬簡存最憶龜蒙雲氣重舞雩新服試春温題陳維新詩巻才子清華孰與羣古詩秋興浩如雲海中夜月珊瑚樹江上春晴錦繡紋溧水釣魚辛少府武夷放棹杜徴君歴觀卷裏􅁭期士鳴鳳朝陽與世聞題劉伯温行卷并序監憲伯温劉公出示館閣諸君子送行詩文兩大卷其一自中臺出佐浙省時賦衆仲題其端有以見朝廷選任之專職事之難者後一卷則自著廷持莭江右之賦也伯循跋其左具言述作之暇道西北形勢古今之迹經覽之壮有重㑹講明之約一代文物之懿備見於斯何其盛哉某感别欣遇又知監憲公深有得於大易智崇卑之㫖庸述鄙懷敬答盛意不勝惓惓西極山河轍迹通載馳江海視民風帝王漸被知今逺秦漢經營歎昔雄憂國早聞生白髪濟時誰識信丹衷斯文一縷通微顯隨地成能造化工題黄智仲詩卷繼爕御史黎僉事詩後弹鋏何妨鬂漸踈侯鯖徧食武昌魚故人江海浮雲盡歸鶴城樓落木初御史青春懷舊意郎官白首寄來書解囊為説經行處歴歴秦川畫不如書荘武公遺事後荘武勲名汗簡青贊書錫爵自朝廷時傳令徳連三世家有髙年過百齡胄嗣蒞官原問學封邦獻禮贊儀刑周詢還奏澄清效衮職從容煥日星自題為危太樸作大地㣲塵海一漚取之無用棄無由日髙睡覺還聞鳥雨足歸來但牧牛冠帶衣裳明日月陶匏木石老春秋何人冩此閒中意獨立晴空詠未休故人故人為别十餘春夜夢相逢面目真世外音書遺雁羽壁間圖畫潤龍鱗可憐白髪寒仍短待得黄花晚更新誰有髙才如屈宋九歌江上樂明神孟荘孟荘同世不同風縱使相逢亦不同豈以髙明分彼此總於衰晚共豪雄竒才别出羲黄上大業難忘舜禹功無位無時千古逝誦言忠辯愧愚蒙吳先生壽日承明三召意勤渠歸老從容問燕居几杖雖塵無倦色經綸不用有成書春深雨露多沾溉晝永風雲妙巻舒華蓋浮邱漢儒行千年髙並翠芙蕖寄壽楊友直恩詔來頒擁莭旄壽尊酬獻畫堂髙郡人傳冩登髙賦野老驚看侍宴袍契濶舊交多老大澄清能事屬賢勞鳳池緩步歸猶早鄉社耆英接譽髦寄楊友直山林十載便幽趣城府連朝謝故人前席謾言宣室事小車且㸔洛陽春舞停紈扇清樽側醉揷花枝白髪新人為村頭農務急不辭鈴閣渡江津寄陳衆仲承詔摛文入禁林一揮四問夜堂深五人存没風流散十載浮沉老病侵曳履想迂青𤨏步下帷傾聽白頭吟多材政有西江客衣錦歸時好寄音寄陳溪山坦坦幽貞夏日清髙懷千尺自秋聲華山雲外觀真逸洛社春中憶舊英雅論圖書陳太守静容簪佩列諸生丹成有道傳中表嵗把芙蓉奉壽觥寄楊臨川五月新涼似鑑湖吏民爭候使君車稻田雨足臨流喜墨沼雲生對客書疲瘵逺人訢獨得文章列郡竟誰如寓耕封内宜修敬老病衡茅禮節踈寄蒙古松巖驛舍相逢已十霜每懷髙節倚雲蒼星辰劍佩趨黄道風月圖書侍玉皇萬壑秋聲回浩蕩九霄春夢入微茫垂絲到地苓如玉擬劚清冥頌久長寄費無隱清朝自冩玉宸文冠戴芙蓉着錦裙碧落開圖呈五采素雲引練事三纁羣真定録渾相識上帝臨觀密自聞書畢緑隂垂數畝長疑忩户宿春雲寄趙中山清鐘曉徹轆轤乾十載霜蟾獨自㸔䕶法老龍思淨梵化人孤鶴報平安相逢歲晚頭俱雪想見春陽氣若蘭欲辦芒鞵求覿面晴虚䨇景共清寒用聶御史韻贈忻都兼寄張伯雨㝷得山泉可枕流寒茅為舍就中洲故人春月多新夢游子秋風足暮愁楊許有書留玊洞松喬無迹到瓊樓亦知李白因貪酒頭白無縁事逺游次韻陳溪山二首積雪柴門晝不開行庭無迹太寥哉深根一息先天氣平地横陳㡬刼灰潮候夜中隨月滿斗杓天際挽春來溪翁定有扁舟興晴昊繁花問逺梅茆簷向曉喜雲開積雪如雲安在哉春澤堅氷成解液明忩旭日動飛灰山隂忽有移文至松下那容喝道來小大往來原有數莫占消息向枯梅次韻陳溪山紅梅三首氷雪肌膚染絳雲歳寒林下對吟身先天氣至渾如醉初日光融轉更新白髪無能酬造化金丹有道駐長春少年莫笑詩成處傾倒相歡忘主賔春曉紅生島嶼雲此中儘着兩閒身不愁花笑髪鬚白漫謗人傳句法新曲水徘徊天上日深杯斟酌自家春繁英未落頻須到翠實金盤尚及賔雪後孤根發暖雲栽培本自一人身紫薇遺意成千古絳蕚深期又一新忠厚敢忘嘉樹賦冲和思廣此枝春若為穉子猶堪教三祝三加望大賔來章末句有祝㓜兒之意先生屢言先君手植紫薇於堂前賦詩屬望小子時人不之許也頫仰五十年委身田野莫稱先志集感歎成賦次韻答楊臨川歸興秋光晝寢髙使君詩瘦怯宫袍東湖㣲雨生顔色西日浮雲見羽旄橘柚園林誰共奕蒹葭洲渚或容舠誰家此日樽無酒兩鶴翩翩過九臯舟次臨川用趙壎韻文公經濟入精思陸子髙明自得師投老幸依賢者國興懷况在歳寒時為邦孰與從先進擇善誰將覺後知十載郡樓遺訣語扁舟江上感君詩山行次韻從來年老喜逢春宇宙中間自在身鬚髪還如柱下史胸懷仍似洛中人春雷起處耕雲外曉雨晴時釣水濵况復歸歟清晝永坐聽童子咏睢麟次韻曹子貞宦學三年不自歸從人飢食復寒衣蒼麟一出春秋畢黄鶴重來城郭非靜對風雲觀變態閒吟來往玩神機乾坤自是無今古不用忩間惜寸暉泊舟安和阮宅次黄志髙韻十月東歸下石瀧羣公促膝共輕艭蕭雲故宅多喬木阮籍清樽對暮江方駕肯來良馬五尺書先寄鯉魚䨇欲求深隠何山曲雪竹霜筠共一忩舟宿湖口二首汀沙如雪水無聲舟倚蒹葭雁不驚霜氣隔篷纔數尺斗杓揷地已三更抛書枕畔憐兒子㸔劍燈前慨友生尚有乘桴無限意催人摇櫓轉江城長年人海混潮聲水宿荒涼却夜驚月照空巢烏繞樹風吹短草夜知更要觀此地秋濤壮更待明年春水生不比蜃樓多變見彩雲初日擁層城次韻劉桂隱懷哉嵗暮扣重關置我髙堂左右間逺道無人縁已老凡情不斷若為閒徐行歴歴皆平地滿目青青是好山莫怪邱園待春雨扁舟先愧逐雲還謝廬陵兩劉君扁舟已作渡江雲回首髙年憶兩君坐客頓知韋刺史詩人猶拜杜㕘軍總㸔玉樹當春晝長對青藜過夜分他日聚星如可畫殷懃垂白更論文山木閣一首送人之京山木閣東初日生梅花照溪人欲行玉杯在手山影入瓊精載道霜氣横故人天上今白髪賤子山中常倦耕憑君問訊金闕下羣賢朝回春日明次韻孟天暐典簿佐奉使行江西所賦帝念蒼生不鄙夷任賢清問載旌馳山川舊履車書㑹草木新春雨露私千道悠悠分楚越四門穆穆出宣慈舉頭見日天光近老去無憂託啟期送撫州推官于夢臣改除吳興别駕撫州那得似湖州千頃鷗波可放舟别駕老便公館靜髙門長憶故園幽緑隂青子人家曉古木踈篁水墨秋㡬欲暫為江海客百年耆舊記風流送陳繹思歸㑹稽讀書右軍髙致絶清真况復東牀玉樹春上馬詩成誰共語讀書鐙逈互為賔落花飛絮縈歸思流水游龍接暮塵無限當時觴詠意尚疑身是㑹稽人送秘書也速答兒大監載書歸成都連舸載書三十萬雪消春水上成都列仙歌舞成烟霧世将旌旗屬畫圖定有鴻儒堪設醴豈無佳客共投壺子雲白首歸無日獨抱遺編隔五湖送普從昇驛使調廣東秋露垂珠枸杞叢海天火齊荔枝紅飛行萬里青驄馬指顧千夫赤羽鴻虎帳夜傳文字宻鮫人春貢語言通一門諸父吾親舊待爾歸朝㨗奏同送成彦舉奏差遷湖南莫憶并州是故鄉江城十載簡飛霜賔鴻不及馳車逺語燕還迎舞袖長下瀬未休連舸餉觀風頻上奏書囊雲開南嶽多來往應有髙情聽九章送人回湘用魯子翬僉院韻東門有客上歸船舍弟過從歎昔年清宴翠帷明諫草髙譚羽扇動江蓮湖南賔客今誰在湘水蘭蓀自可仙珍重太常臨别語毋忘餐菊飲寒泉寄監郡敬齋華蓋天風八月髙使君于此重遊遨停雲每約松間鶴載月同登海上鰲人愛桐鄉留繾綣道傳柏府薦賢勞柴車已是輪生角那得黄花共濁醪仲秋二十一日雨後聞桂香柬竹齋諸友曉來滿國桂枝香明嵗秋闈苐一場明月當樓天廣大疾雷破柱雨淋浪鬼神幽逺驚雄辨草木欣榮被耿光于易已占觀六四真儒不數漢文章訪羅元徳隠居春溪回曲抱郊墟新見幽人水竹居車馬不知行地樂樵漁常近讀書餘一川風月閒來往終日雲雷妙卷舒獨究塵編誰得似同游為記暮春初憲副孛顔帖木兒行部過訪六月驅馳使者車城南詢問野人居韋編猶記成均舊玉斚親分尚醖餘師友道存風義重山林嵗乆禮文疏但期荒隴霑霖雨課子躬耕理故書與易小雅雨過横塘早擊鮮西鄰宴罷到東園醉吟明月花枝好坐對涼風桂樹繁玉雪泛甌留夕語銀絲分椀約晨飱壽朋總憶城南好每採芝苓過逺村憲府集後書與紀長之嵗暮賔筵坐席深衰顔何足重為欽有岩佐史加籩豆於粲笙歌備瑟琴佇想虚煩求舊隠聞風實起好賢心誠孚徳合生民慶往昔誰容只在今與陳維新新公家在觀橋濵茅屋蕭然不染塵通夕跏趺光炯炯經時神屋火勻勻一杯秋水留仙客半嶺春雲共野人借問如何㕘絶學破除妄想不求真答劉無作南國隠者劉無作古木隂中户不開惡客任携袍緼去化人又送飯盂來吟詩忩下猿供筆振錫林間虎卧苔二十七人尊宿字夜深相對語如雷答毛南楚恵書華峯迎對浮邱伯故憶毛公共説詩良夜挂巾松上露㣲風揮麈竹邊池近來有夢如春雪重到何人識鬂絲此去相望三百里時因歸鴈問幽期答陳明復城頭雲重鴈飛過憶得江南夜雨多茶樹嶺前雷破石稻秧田裏水盈科何時短棹鱸蓴菜盡日長松蔦女蘿頼有仙翁知此意不同樵唱即漁歌保同監邑送桑本樹桑親教縣庭隅分我深根四十株老客遂居連野緑使君重到兩輪朱寒忩機杼依鄰曲春服兒童出舞雩頗有薄田衣食計暮年終夢在成都陳㓜徳送竹本竹似陳家好弟兄清隂秀色滿林生八龍夭矯同瑶席䨇鳳參差和玉笙土潤已如含雨氣夜深便可聽秋聲他年為作青青簡待爾光明獻賦成謝董子道參政再世門牆五十霜扁舟風雨渡滄浪少陵生理憑黄閣孺子髙亭歎豫章文學舊游成寂寞廟廷新刻更琳琅惟應垂白江湖表北望風雲古柏蒼謝馬昂夫總管嵗宴相㸔雨雪深一尊春酒故人心曾陪鵷鷺俱塵迹晚托漁樵得共吟天上鳳毛還禁直人間鶴髪更登臨畫圖三友題名字漢𨽻還須老華隂謝陳溪山慶生朝自笑青年説學仙衰翁那復得芳妍詩書塞坐忘謀食風雨長齋過禁烟有樂從教兒輩覺無言可與世人傳髙情惟是希夷叟長住蒼松白鶴邊謝劉伯温世外髙情與道謀欲令斷木出寒溝終身不敢窺韓子病目誰能念左邱生晚見聞慚禮樂業荒文學感春秋未忘垂白從耕稼鳴鳥髙梧咏不休謝胡士則舊學都忘耄日侵故人千里忽相㝷坐依敗壁看蝌蚪手撥殘編堕白蟫五色蓬萊前日夢一忩風雨百年心羣賢列坐書連屋至樂無餘祇在今謝魯元起監縣雨足時和縣事稀弹琴學道一儒衣塵編得意常終卷匡坐思憂只掩扉壽母平安充一喜古人髙遠類多違文章於世真何補毎過城南晚咏歸謝楊士𢎞為錄居山詩稿二首少日詞章浪得名歸與樸學補餘生揚雄執㦸能清靜庾信凌雲愧老成㳺目山川誰妙識興懐河洛獨髙情殘編乆棄知無用為錄幽泉絶澗聲畫㦸髙門對碧岑公孫才思在登臨少陵不盡山林吟季子偏知雅頌音貞觀詩人同制作太平樂府入沈吟明年何處聽鳴鳳春晝梧桐滿院隂酬吳彤塈諸友編文知愧空言惜已衰煌煌三秀感靈芝山前雲過那堪記水面風來祇自怡逺使徴書傳盛意良朋定録副深期塵編盡淨遺虚几何補斯文與世知贈義上人赴京瀟洒澄江對寺門講餘江上㸔朝暾白龍起聽經函秘紫鳳來朝佛像尊召見天人扶履舄還歸帝釋賜幢旛故人十載靈芝秀春雨山堂誰共論贈張元樸黄茅岡逈少人行目送飛鴻又晚晴麈尾每懷張伯雨鵞羣今屬薛元卿天風浩蕩髙眠起夜雪空明老翮輕黄石祠前好孫子莫教塵世苦知名贈婁行所二首三嵗京華憶母歸一邱岑蔚感春暉瀧岡墓表非無待溧水哀吟恐自違疏食一簞嗟逺道送車千兩念征衣中間名勝多知已屬筆何由到草扉江上飛花已暮春朝中憶爾渡江人共㸔傳燭分新火更與臨流袚舊塵使者獻書歸館閣尚書薦士到絲綸斗牛儘有光芒在緩步行聞接鳳麟贈道士神寳誰開自洞微紫烟為户玉為扉春容澹薄胎仙舞夜景虚明脉望飛繞指風雷龍睡醒滿囊雲錦虎䭾歸猶嫌長物煩聞見更上髙臺一振衣贈彭致中游廬山手持數節羅浮竹直到棲賢三峽橋錦繡烟雲隨鳳起珠璣淙瀑作龍跳陶潛菊徑須頻往李白松巢亦易招我與山人俱有約秋風更待海門潮贈髙文舉志士猶思及物功尚施仁術簡書中江湖隨地宜秋色桃李成蹊任化工執轡㡬時觀逸興揮絃聊復送飛鴻塵編舊業應無厭八月明河九萬風贈道士鄒雲山一片春雲萬仭山六鼇戴向海波間金銀樓觀蒼龍戲日月旌旗白鶴閒換骨有丹宜早服虚心如水及秋還九重元與蓬萊近㸔爾仙衣簉玉班舟中書贈吳彤輕烟冉冉日曈曈好友相從一舸同白雪夜吟蘇武慢清波晨動楚王雄天清洲渚多嘉樹道逺江湖有暮鴻不是新知相啟發歸歟恐負菊花叢贈徐元度并序昔時三公丞相掾有賔客之道焉㕘决論議皆國事也接之有禮行之有道是以君子信之也國為丞相掾特文書論事可否職事有不得不然者其後三公官備掾屬甚清簡時人尤貴之然而禮貎輕重之間存乎其人矣毗陵徐君元度方弱冠時學於吳中鄭明徳氏文藝頴出識者有望焉某於豫章見之則從事師垣出掾浙省而至於斯也蓋二十有四年矣雍容以文進退以度識大體不汨於流俗慎言敏行名實孚於上下鴻漸之羽翺翔於天亦維其時也哉至正乙酉正月上吉將為外宰相報政於中若夫方物之獻貢賦之數有司之常事也在元度優為之矣明良在上顧恵逺人外將有問焉羣賢方以文學治道佐明時當有知元度而進之者賦詩以送之起家辟掾三公府拄笏西山度嵗年故舊總懷天下士風流更重幕中賢香烟滿神游絲夢春水如天上計船三月㸔花鵷鷺裏題詩還向逺人傳贈敬上人二十遊方四十歸人民城郭總依依雲生谷口為雷去花滿林間作雨飛宻室爛泥成寳器諸天刼石拂銖衣扁舟穏泛鄱陽水更問雲門莫莫機贈鄒生君唱銅鞮道更優我歌錦瑟送長游景純厠上灰飛刼一行門前水逆流曾把仙翁血醫鶴要知衙將面如猴談天談到八十一好問九州州外州遣興千梳白髪度清齋有客柴門始一開書為目昏空對簡酒因囊澁久停杯北忩風雨長孤坐南海音書遂不來壠上輟耕童稚輩强來問學慰衰頽為熊㬅初賦靜觀睡覺東忩鼻息㣲水流不競落花稀風旛底用生分别塵鏡何情辨是非春去蝶隨游子夢秋深螢入定僧衣可能袖手髙閒者㸔到行雲作雨歸滕王閣髙閣城頭户牖開江中照見碧崔嵬文章誰在三王後雲氣長從五老來畫角數聲南斗落白鹽萬斛北風廻洲前先有蛟龍窟惟待詩成急雨催玉華山何處清江擁玉華手題名榜寄仙家光凝石殿千年雪影動銀河八月槎藏藥寳函騰玉氣説詩瑶席散天葩奎章閣吏無能賦得似新宫蔡少霞天峯道院衆峯環列總名山㬰出岧嶤紫翠間上直文星天一柱中含道氣玉重環臨池風月清秋老繞閣􅃄霞白日閒溪上墨香傳遠客令人思與鶴飛還次韻寄題象外道院至人還作采真㳺海上何妨更九州雲氣低回依寳劍月華臨照是􅌦樓舊家孤竹清風在今代三茅碧澗流凝望蕭䑓環日月不知何處問丹邱寄題三益亭錄呈仲義叅謀公府蒼松六百㝷古梅脩竹共亭隂歳寒先覺氷霜重春永還知雨露深毎得􅌦瑰三益友同堅金石一生心坐令方丈凝香地千里嘉名起自今題梅仙峯與彭致中羣仙山上共神宫漢尉蔵丹别有峯日下旂旛來碧落雨餘鐘磬出深松蓬萊秋近雲常接芝草春生手自封山木閣前聞拄杖解㝷樵徑逺相從題新喻吳氏浩然堂古木澄波月色新髙亭携手兩幽人畫圖樽酒猶清夜屋壁金絲㡬暮春白髪諸孫隨草徑寒泉一掬薦溪蘋神交何必曾親到莫望髙車一幅巾浙西憲郎武子宣監試秋闈試官往往得鴻儒可以觀瀾在此書憲府優游從事後貢闈閒暇校文餘虹光西起游湖舫雲氣東隨問俗車古者八元宣在五復明還見謁宸居魯國趙公世延哀詞二首西北聲名世節旄簪紳特起擅時髦百年憂患神明相世務頻煩志慮勞春雨歸舟江水定秋天一作風遺劍雪山髙東瞻松柏分茅重盛徳終聞有顯褒早嵗江東接令儀中朝晚得近論思永懷王母傳經訓直保孤忠結主知經濟尚多遺策在勤勞空復大名垂每翻翰墨神交逺惆悵西川鼓角一作吹悲故贈奉議大夫太常禮院判官廬陵范公哀輓名家積行子傳經夜接風雲對大廷一日文章驚海内九重恩錫賁郊坰奉常天上新題字處士江南舊列星何事瀧岡遲有待翰林翠琰倚香亭題楊友直歩鶴圖羣仙玉殿早朝迴獨向空山步紫苔雪色羽毛千仭下天門風露九重開碧梧空老人間實瑶草原非世上材真侣相求寥廓去徐行更待鳳皇來春雲亭石上春雲向晚生隨風映日在簷楹莓苔翡翠千年潤芝草琅玕五色明鶴為迎仙香冉冉鹿能留客露盈盈深紅重翠長千斛細吟清歌奉太平題鄱陽胡仙伯活死人窩大海何曾着死人縱饒得活也逡廵中黄土裏埋焦穀太白星前掃幻塵銀漢槎頭成恍惚布帆船子弄精神太平歌裏無生滅惟有胡笳拍拍真寄題鄱陽李氏適軒豫章出地已千㝷仙李盤根接翠隂曲水橋分雲錦麗老人星見草堂深衣垂五彩㸔春舞劍化䨇龍聽夜吟借問髙軒何所適一門眉壽里人欽酬書巢送雉尾拂一帚千金輯雉翬巢公乞與掃塵扉凝膏不食慚金鼎畫采為章憶褧衣宫扇每開春日麗城旌常拂曙星㣲諸縁隨起隨除却祗有無臺月鏡輝㑹宗海藏主來江西一日山雨稍涼同普安枯石見過復有還浙之興書偈為别并柬一關大士同發一笑試問師歸何處㝷稽留峰下白雲深長松正並樓臺秀流水長交鐘磬音貝葉㡬行西域字寳珠一片祖師心天香桂子人間滿擬約髙秋一醉吟送文學隠上人西江春漲欲浮天擬覔何妨一味禪渡海晨鐘雲外寺乘潮晚飯越中船鉢分龍腦天香近茶泛玻瓈雪乳鮮文采已彰那可隠芙蓉出水正華年送劍江復見心上人游徑山臺山驀直勿岐差䨇徑峯前路不賖若有劍光衝北斗更愁帆影落誰家曲江水暖花千樹古道秋髙月一槎記取題詩相送處鷺鷥和雪立蘆花重贈復見心游浙兼柬張貞居春雨西江漲百川袈裟又上浙東船行㝷龍卧雲生徑坐聽猿吟月浸泉客裏有詩煩為寄山中何法可相傳故人或者詢張拙鼻涕垂頥雪兩肩賦文子方家篔簹亭竹影二首數箇篔簹一小亭南忩承日印寒青水精簾裏珊瑚樹雲母屏間翡翠翎却愛㣲風動蕭瑟翻疑薄暮倚娉婷憑君縱有鵞溪絹莫與空花結定形憶昔竹枝皆楚歌何曾舞影見婆娑玉山雲氣了然是湘浦雨痕空復多環珮因風猶錯落旌旗拂日轉委蛇白駒皎皎誰能繫霧閣芸忩奈老何梅庭詩為李重山賦髙人獨愛寒梅樹相對庭中作主人盤谷泉甘來素履長安日近接朱輪瓊瑶比徳懷新好鐵石為心憶老臣傳得朝紳詩總好揚州何遜久逡巡送戈伯敬東訪伯循御史扁舟重訪瓊花館使者還峩豸角冠定有薦書天上去豈無懷綬邸中㸔宫牆隔樹聞鶯囀朝路聽雞上馬鞍頻寄好音傳父老鄉人總説上長安與侯頥軒并序道士侯頥軒其先本蜀人父闕從我大父尚書府君來吳中宋亡弗歸頥軒乃學道於洞庭之仙壇觀集來省墓嘗抱先叔祖岳陽使君遺書與間白雲來見集不勝感嘆故贈之以詩洞庭髙士成都客曾是相從大父時每抱遺書嗟往事復貽妙句樂新知鴛鴦影裏心元靜鷗鷺盟邊願不疑但得閒身各安健白頭歸共橘中碁題商徳符蜀山圖每愛商公冩蜀山蒼崖直下竹林間錦城雨後江沙白劍閣霜餘木葉殷何處揚雄池盡墨誰家杜甫月臨關釣鰲海上天空濶待得仙槎一往還道園遺稿卷三
