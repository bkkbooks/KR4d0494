body:
  text: 道園遺稿卷二元虞集撰古詩七言歌行雜句類雪山圖為劉伯温監憲賦我家成都雪山東公家張掖雪山北吳船誰載鄭廣文起寫崑崙半天白張掖雪融草木長禾生壠畝多牛羊烽火連臺擬樓觀江海微茫秋練光著書東觀夜如水太一燃藜照圖史從遊冠帶文武備斐然四郡良家子君不見黄河奔流百谷盈神禹疏鑿中州平極天鳥道雲氣盡惟北有斗西長庚天涯歌為崞山公賦大鹵之虚山有崞彊晉名都古城郭太帝親征西極還命總師干理鄞鄂三世專居二百年公孫御史籌帷幕興言諫諍國體重抗論陵夷鄙夫怍九衢塵土迷白晝萬里天風飛一鶚連山長城下平曠孤秀嶄巖自天落安車夷猶奉王母咫尺天涯下磅礴振河載華坤軸穏捫參歴井天梯鑿六合髙牎竅空洞日月容光隂氣薄春鬟翡翠擁烟霧秋水芙蓉淬鋒鍔東游漫愛華不注西行不到秦關㟧上方宫闕何所有囘首穹窿起龍漠天山舊音本雄渾孤鳳一鳴冠阿閣蒼茫石鼓難為聲野水寒雲不堪酢奉祀曽過軒轅臺俯仰髙深嘆今昨汾波横出衝黄流長感秋歌入寥廓卷石東南雖有聞安得停車徧丘壑元姚自是一世豪若比公詩少揮霍有詔無容極幽賞黄木扶胥求海若前茅度嶺建旌纛後吹淩波雜簫籥馬飲清泉榕樹隂鴈隨飛雪梅花萼退食委蛇幕府清明月懸空夜城柝横槊髙吟動鬼神轉鈞妙手隨斟酌坐令刀劍化牛犢夾岸鯨鯢貫鱷蛟閬風𤣥圃在天外玉振金聲為誰作雅歌緩帶有餘暇直道髙情無宿諾百粤皆知白水心羣魚莫恃黄金槖國家將相真有人中外均勞正參錯請開雲漢分天章歸理咸韶奏嘉樂老夫當與園綺徒仰聽鈞天佇耕穫謝王員外贈古銅帶鈎劒琫歌金銅帶鈎屈螭首緑玉沈沈世稀有古人佩劒之所遺虚琫尚疑光射斗腰圍老去忘繫拘空服書紳重有餘竒哉二物君子贈敢與礪燧同縈紆古者弦韋皆有托視我斷金庶無怍循循偃蹇長在手神化翻愁入寥廓劒能使我無邪心握之在本用在鐔利器行藏兩無有一寸空間空古今他日東行尋禹穴何以酬之掇明月白雲滿地歸去來不待傍人三奉玦無住和尚命俞巖隠寫予陋質予蓋簪纓家子其意亦蕭散因作山偈一首戲贈聊發住公一笑也我欲自識面莫如鏡中真引鏡實有我卻鏡見無因俞侯乃善幻作此意生身旁人總言似我亦愛其人但恐年嵗久不知是何人俞侯俞侯吾已老百事無能勿復道幸自不曽虧損他莫將塵影瞞人好金人出塞圖此詩學古録失傳翰林珠玉已有脱句海風吹沙如捲濤髙為陁磧深為壕築壘其上嚴周遭名王專居氣振豪肉食湩飲田為遨八月草白風颼颾馬食草實輕骨毛加弦試弓復置櫜今日不樂心慅慅什什伍伍呼其曹銀黄兔鶻明繡袍鷓鴣小管隨鳴鞉背孤向虚出北皋海東之鷙王不驕錦韝金鏃紅絨縧按習久畜思一超是時皛清天翳絶鴐鵞東來雲帖帖去地萬仭天一瞥離婁屬望目力竭微如聞音鷙一掣束身直上不迴折遂使孤飛一片雪頃刻平蕪灑毛血争誇得雋頓足悦掛兔懸狼何足説旌旗先歸向城闕落日悲風起蕭屑烟塵滿城鼓微咽大帥要王具甘歠王亦欣然沃焦熱閼支出迎騎小驖琵琶兩姬紅顴頰舞歌迷進醉燭滅穹廬斜轉氍毹月九歌圖太一神君號東皇玉質要妙含和陽生生炁始通微茫綿綿蒸空神中央浮英上羅文天章覆冒下滿谷與阬旁塞無間靈無方靈來乘柔柔乘剛湘君夫人鎮相望清温静好非淫傷司命元老元氣昌手執藜杖色老蒼歴刼壽命不可量少君之壽同其長離無異體合有常出入萬化終不亡晶明發晨上榑桑海天赫赫真金芒質鍊不滅長垂光河源混混流湯湯伯也坐視無迎將千古萬古何堂堂彼幽為厲為强梁朝貍莫豹方鴟張精魂熠耀志意荒招之不反巫無良屈生作歌沈九湘世人傳聲罕尋詳祝融仙子調𤣥黄九神出圖百怪藏不信請視虞公章送吕教授還臨川并序古者仕不出其國五十里百里而已入仕王朝才千里而近無父兄妻子墳墓屋宅之别而有禄食之羨車服之華焉豈不便適人情乎哉今國家奄有宇宙仕者視南交朔易若東西家然則彼出入驅馳不越乎州閭黨術之間者不亦隘乎吕君仲謙世居臨川之南山木鬱茂田毛易長仰事其親俯育其妻子何嘗有意于逺遊哉一旦用薦書得為遼東學官隨牒以行且萬里冬裘不足以禦寒蔬腸不勝其恒肉雖志氣不變然情能無少違乎僕願留之館中而不可歸其宜矣故作詩以送之黄金作臺留好客好客不留秋月白東風吹雪滿衣襟却賦長歌送行客一作色遼東之山醫巫閭六月五月雪不除昨朝遣使降香去五尺氷上行飛車一作飛行車知君江上慣舟楫快馬如龍亦徒設束取來時一卷一作束書還向江波對一作弄明月我本蜀人隨水來結屋與子相隣隈白髪京塵不歸去臨風相送興一作空悠哉三鳳行贈海東之下第南歸海東之兄弟三人如鳳皇胸臆羽翮皆文章九年三入天門翔伯沖天季驚人一日四海皆知名東之之文五色雲見者眩晃生眵昏三進三已之了若耳不聞二人得之喜未足云東之不愠乃可尊束書江上歸見親君子之樂樂最真君不見匡廬之山崷崪而嵯峨左界乎豫章諸川㑹為蠡番其隂千源浩浩導岷經潛沱山氣束鬱不得去上衝為紫蓋直與天相摩為雲覆八極為雨漲九河海東之子能觀山以成德其進蓋未易量也偶爾小詘奈爾何戴和父歸越戴先生日飲五斗醉不得再飲一石不肯眠昨從桃源來兩袖攜風烟長安市上小兒女拍手攔道呼神仙馬如游龍花如雨蹴蹋春秋作朝暮東方不作牎間戲上帝還令海邊去海邊玉虹夜不一作何日收貝宫珠闕皆蛟虬芝田玉樹久相待天上老僊那許留戴先生鑑湖之水三千丈不可以鑑可以釀明朝亦脱錦袍去一作歸與爾酣歌釣船上題米友仁長江烟雨圖寄柯敬仲米家自在江頭住愛向長江寫烟雨長江烟雨萬里餘書畫扁舟在何處古人翰墨今罕存好事千金焉足論憑君寄語丹丘子盍買山田遺子孫吳中女子畫花鳥歌皇元風雅為人錯刋吳中女兒顔色好洗面看花花為悄調朱弄粉不自施寫作花間雪衣鳥緑窓沈沈春晝遲平生心事花鳥知花殘鳥去人不歸細雨梅酸愁畫眉楊補之掀篷圖十年騎馬燕山道飛雪如花著烏帽清江不復泛扁舟況見繁枝揷晴昊楊丞拈筆寫江村滿卷荒寒共郊島君不見金盤玉一作宻露錦成團胡蝶東家怨春早王侍郎崆峒石德符堂中有真石一握𤣥雲出靈碧飛潤應能作霏雨含光自可裁圭璧天根萬古磨不磷窈窕中虚藏谷神願得微言獻天子千二百嵗勤修身雪嶺駞車七月八日山隂道積雪平砂沒煙草三日餐氷渡磧遥重載槖駞發車早當衡比比擁䝉茸王庭傳令疾於風却憐聚落在何國可以踏歌酣馬酮居庸關南百萬里春雨草青平若砥嚮非羊馬便髙寒所不懐歸如白水題上都崇真宫壁繼復初參政韵故人一去宿草寒而我幾度南屏山琳宫素壁見題字輒墮清淚如洄灣文章百年世何有如以鈍拙鐫孱顔瞥然有感亦易散奈此細讀多髙閒沈思不見托魂夢何異落月留梁間走為麒麟飛為鸞黄金作玦玉作環重來豈無造化意我以白髪遲公還城南春曉圖天台先生有山癖卧起無山朝不食幾年騎馬聽朝雞磊磈諸峯拄胸臆陳生受意不受辭竟拈秃筆為掃之既安樓觀對竒石復著梁棧横清􅀈游吾舊游釣吾釣隔林彷彿聞幽鳥瓊臺何處無桃花此是城南暮春曉夜來天子傳詔呼先生直上鑾坡趨盤盤迴復一萬里無限好山并好水如從島上見陳生盡寫歸來畫堂裏天台圖天台一萬八千丈下視東海如一盃金雞候鳴日欲出吞吐澒瀁聲奔雷白雲瀰瀰散綿絮贔屭戴出三崔嵬一一十十翠撑拄千千百百璚樓臺王生染白作莽碧囘風御氣洪濛開古亭髙卓盤石上横舟自揷烟林隈老楓古檜立岸側云可自此登天台尚無雞犬識林落況有車馬相喧豗我少學仙意疾得首如蓬雪俄毰毸臨風每憶坐忘叟深愧失脚無由囘尋常夢游如宿到忽見畫本興余懐赤城仙人王志和爾家靈寶安在哉人間夢斷何足許存想終日勞形骸庭間竹葉可舟楫羽衣生雲歸去來桃源圖層巒複嶺何崔嵬流泉委注波無迴昔人尋源既解往孰謂後世無能來徐生採藥渡瀛海生人之資悉滂沛汎舟一去不復還自是秦皇親為載商於只在咸陽南城中日日見晴嵐四翁採芝列頭白何人往問窮幽探信知桃源隨地有自為狂馳不囘首莫向神仙詰渺茫且對新圖玩春晝軒轅鄉裏真固師果得脩身身不衰年穀順成物不疵𤣥黄衣裳從委垂牧牛歌贈自牧上人學人曽是牧牛兒細雨斜風總不知豐草長林情似水懸崖絶壁命如絲不著境兮不離境繩杖隨身端息瞬歴年辛苦一朝忘贏得半川烟月冷君不見大江東短蓑衣横笛何曽别晚風大地山河等甘露嘉禾成熟萬方同國泰民安謌頌起無言可贊牧人功老師兄善自牧露地當年已純熟大千妙用一毫端不是寂空聊自足澧州謝家通濟橋澧有蘭兮沅有芷相望涓涓隔秋水蛟龍迴夜隠波深虹霓乘晨駕空起千年石尉何西東天下有道津梁通朝桐東皇蒼雲中行人無忘懐謝公豐州李氏孝義詩沙中枸杞已成樹的皪丹珠飽秋露蒲萄滿堂間鍾乳上堂饌食有肥羜壯者已老少者壯蜂房各自開牖户此是豐州孝義門莫忘河南李家譜龍興黄堂隆道宫西華太姆元君飛茆詩并序空同子竇君神清與予賦詩于天寶宫予有句曰一瓢春水煮仙茆神清曰噫子安得及此我昔游黄堂見石曼卿記不載飛茆始末願與同志者詠而傳之久不暇也神人將啟子而誘其衷乎不然胡為而及此也予應之曰彼夫容洞中穠麗主者宜不察苦之味也非余孰當賦之乃為之吟云昔日飛茆渡江水一息秋風五千里憑虚結根土長苗萬古黄堂咀甘美潔清至浄服食仙不忍獨令身不死折瓊載卜知吉亨連茹包之獻天子郎官湖李白祠南交黎侯景髙歸朝三十餘年自至元中被命驅馳軍旅勞効顯著後賜田江漢之上以居暇日作安南志若干卷示不忘父母之邦間嘗即郎官湖上修太白祠皇慶初元來朝大夫士多為侯賦詩郎官湖邊太白祠百年毁壊誰顧之黎侯自是南海客寂寞湖上看明月間關歸國故時心馬上鬢毛今是雪春來幾見湖水清春去還看湖水碧今人蕭條古人逺黎侯此時淚沾臆臨湖作屋祠太白一日祠成人歎息千年太白豈復存惟有長庚射西極光芒彷彿雲委蛇黎侯起舞天為泣鯨魚上天終不返黎侯惆悵坐成晚君不來兮那可期黎侯之心湖水知湖水波浪湖樹葉風來總是迎送辭金馬圖人負金馬睡於馬上賈人自騎千金馬解囊小憇荒城下平原無事起秋風夢到隂山雪横野太平疆宇大無外外户連城無閉夜不然安有獨行人懐寶安眠如畫者王晉卿畫赤壁圖黄州江上霜月白蘇子泛舟攜二客虬龍虎豹木石間玉宇瓊樓歸未得主家遺玦珊瑚鈎丹青一幅千金酬惆悵圖窮見黄鶴白雲千載空悠悠趙子昻畫馬圖憶昔從公侍書殿天閑過目如飛電池邊儘有吮毫人神駿誰能誇獨擅公今騎鯨隘九州人間空復看驊騮惟應馭氣可相逐黄竹雪深千萬秋柯丹丘畫松竹二首丹丘寫松臨石湖一樹偃蹇一樹枯長年偃蹇色深黛枯者鐵石能相待令人最憶寒山子曽見松生此山裏時來石上自閒吟解聽天風半空起江心石上起烟霧隨意琅玕寫無數就中欲覓釣魚竿濯足滄浪嵗年莫君不見白髪天台鄭廣文前身畫師今更聞請看翡翠三株樹猶是蓬萊五色雲陳容畫十四龍所翁所畫十四龍雲海慘澹數尺中毫端欲極龍變化信使情狀無一同意㝠鬼神造竒迹蓻謝狗馬矜精工徐生家藏隠溪上氣與古劒相争雄春雨來時屋壁潤白晝坐對塵埃空持之示我為嘆息安得真見如陳公蓋聞龍乃至陽精無有嗜欲來羈籠昔年髙士隠弗見矯矯衰世追㝠鴻千載神明守龍澤如見潛德遺空濛溪雲出水作溪碧綿綿子孫環為宫石林幽洞難相識獨倚桃竹懐髙風孫康映雪圖千巖萬壑明積雪老樹長蘿掛孤月下有老生眠破廬穴隙窺書癡涷鶻何如出門歴瓊田翻身夜入通明天手把瑶筴招飛仙人間畫裏那能傳墨竹歌南風吹雪盡成竹北圃老人寫羣玉枯梢不逐蛟龍化宻葉終堪鳳鸞宿數枝東出好弟兄楚楚劍佩微聞聲兩枝又如父攜子老者偃蹇稚者榮我昔西游洋州驛破緑燒梗具朝食摧殘僅同蓬與麻太守清貧那復得羅山甘竹笋乃佳移根便欲從山家雲風春嶺即持去為我更作風枝斜金源野人獻麞圖紫蓋貴人何處來西風摇落郊原開澤虞獲鮮敢私取下馬持獻披榛萊韔弓服矢遽為拜止轡受之貌閒暇千里獨行日云暮熊耶羆耶在林野君不見吁嗟麟兮人不知卒然遇之慎爾為送人游廬山我愛江上之廬山山止不動江不還紫雲冠嶺危石古白鷗衝雨春波間浩然始見潯陽浦太白欲托雲松間河嶽蕭條二子死神靈恍惚千年慳昔我尋春入幽竹有人抱甕開深關遂從鳥道陟髙險一窺虎跡聽潺湲似聞餘磬開石壁恐是入化非人寰霜崖石櫃成異物銀釵負薪多老鬟嗟我老病難再往羨子輘轢無留艱攬衣步出石頭渡解舟竟到星子灣沈吟三月煙花碧眺望千里楓林殷猿驚鶴怨酬好語水流花開怡妙顔束帶他年事朝請躡屐安得窮躋攀行矣此日不再得空山落日騎黄斑題虎屏髙堂白日静如水屏間於菟伏將起登車何用卜熊貔鑄鼎徒聞走螭魅耽耽仁威謝爪距蔚蔚文章著深美君不見旌旗不動九關閒海晏塵清千萬里陳容畫龍陳容生閩嶠之東骨氣生硬如老龍每拈秃筆掃風雨自寫其真非畫工曽為吾家作雙劍采石波濤天下險巴山昨夜春雨來素壁髙懸户長掩題劉仲明鳴鳳朝陽操鳳凰昔來何所縁堯舜聖明皋䕫賢一鳴不再三千年孤生懸崖命由天鬱繞霄漢纒雲烟虞淵浴日紅滿川海波洶洶不盤旋聲與律吕互相宣非度弱水遊神仙此製不省人間傳題劉光逺琴泉詩卷後長沙老人種桐梓手斵為琴度宫徴彈得流泉石上聲只有巢由能洗耳當時誰與制此名前朝丞相賢公子黄金不成白髪短聊以髙情付山水公子飛仙老人在目送歸鴻秋萬里老人有子前為壽願翁千嵗長如此已將朱袖拂雲和更釀清泉設重几𤣥潭觀劒歌新年風雨晝多晦解纜東辭白沙外𤣥潭觀中有古劒倚棹求觀鬼神㑹隂崖中斷如截肪𤣥水泓渟受前隘欲令開匣猶未敢惟恐雷霆走光怪至神不殺跡已空藏器幽深欲何待孤篷歸坐燈影微客為髙歌聊一快鄰舟借具知有無擬掣寒蛟斫春鱠書昔人出入西廣詩後戈船將軍昔南下樓櫓衝波當車馬臨流横槊昔為誰遷客騷人能賦者桂林近時蠻䝤息營帳酬功頗優暇伏波銅柱髙嵳峩路險難兮莫相嚇送程楚公子叔賔官海上世皇任使無南北楚公薦賢動江國當年臺閣多門生富有文華在賔客世家貴游少者佳祕書奉禮差可階青衫筦庫東海上極目天津思凡槎豫章得君豈忘舊引之清波一援手鶯花三月玉堂深共啓黄封賜來酒送胡士則胡君著書昔同館長日據牀運犀管功臣遺事動如山小小聲名何足算明光殿裏初進書紫衫束帶帽正烏君王歡喜侍臣賀殿下風暄花萼舒是時親賜蒲萄酒瀲灔玉杯先入手承恩歸去各西東共歎文明古希有胡君名冠三十人傳詔與官顔色新寧辭闕下向田里得禄斗升縁為親頗聞山寺近官舍吟步長廊莫騎馬瀛洲學士如堵牆新折琅玕待君寫寄謝楊友直太守送桃竹杖梓潼使君今南雄江心紫玉寄野翁扶持恐是蛟龍化騰躍似與猿猱同十年乞身不待老鄉人飲酒歌年豐君不見太乙之精在天上青藜滿地如蒿蓬寄薛𤣥卿故人贈我漢時鏡殘質剥蝕遺空明開奩照見白鬚髪似是採芝商嶺生憶昔交遊盡㝠邈耿耿銀河曉星落惟有瓊臺瀟灑人長嘯西風滿寥廓題表姪陳可立青山白雲圖昔時謝傅卧東山亦未忘情絲竹間微風動塵車蓋合白苧作衣團扇閒風流一去如秋草我思古人令人老茂林脩竹何處多雨洗青山青更好溪山圖曉日朱方得𤣥鶴一直衝風上寥廓横翔八表覽九州下視山川間城郭清溪縈繞千萬尋金銀宫闕檜森森商山紫雲何處好惟覺蕭臺秋氣深畫龍所翁畫龍妙當世神思已逺誰能繼陳家復見海珠君也向毫端分久似越藤一幅瑩且完嘘雲駕雨淩春湍不知何嵗因轟掣破卷飛上青雲端射虎歌州人布矢之蒿蓬半夜射殺南山雄捲皮帶雪送官府割肉大嚼千夫同前日東家牛盡啗犬豕無遺人落膽不知世有李將軍擊鼓報神聲坎坎刷馬歌天馬之來大宛國漢帝心馳渥洼域貳帥兵甲費如山毛骨權竒不多得世祖開基肇太平昔日大宛俱拱北如雲之馬西北來飛控驚塵遍南陌豢養年深生息蕃即今詔刷無遺迹青絲絡頭千萬輩戢戢駢頭死槽櫪一程瘏毒一程愁比到燕山肥者瘠吾觀天廏十二閑五花成隊春斑斑監官喂養盛芻豆年年騎去居庸關聖朝誰信多盜賊却慮騎氣藏凶奸駑駘盡從天上去驊騮豈得留人間漢人南人窘徒步道路相從俱厚顔我今已是倦遊者東家蹇驢何必借布襪青鞵取次行正喜不遭官長罵鄉里健兒弓弩手詔許征鞍常穏跨嶺南烽火亂者誰何事至今猶梗化君不見漢文皇帝承平時千里之馬將安之又不見項王一騎烏江渡到頭不識隂陵路按弓圖朔風蕭蕭沙草枯避暑南還八月初貴人退食坐平蕪白日皎皎寒雲除左擎蒼鷹右韓盧手調繁弱矢滿壺馬驕不受轡勒拘奚奴前執奔塵趨小者伏兔大於菟上馬一擊將無餘養勇大發神氣舒徒御逺合獲不虚首獻上殺當氍毹連車載槖來徐徐大庖賜宴日未晡蕭蕭笳鼓環周廬天子萬壽臣歡娛我昔嵗從行兩都每欲賦此嗟才疎江村父老相攜扶數尺茅簷看畫圖題游𢎞道所藏劉伯熙畫燕城建都將百年喬木往往遼金前宫中屏帳愛竒古每托畫手馳風烟房山絶筆商山老内府人家跡如掃畫苑今惟劉伯熙白髪承恩最偏好西山古寺刼火餘斧斤所赦遺殘枯久經霜雪如鐵石膏沐雨露還扶疎一夕書帷侍清宴有詔令熙寫畿縣徧圖形勝到巖壑直幹交柯每盈卷游侯縁從自當時閣下庭前屢見之朝衣佐守南海上袖卷龍髯雷雨垂髙堂風動海水立江岳驚奔鬼神泣禁直岧嶤翠蓋髙誰識行蹤露華濕徂徠新甫何足攀巴丘正似青城山人聞彈指千百嵗大夫與我俱蒼顔汪華玉所藏李息齋古木竹石圖帝城佛刹西南曲數仞髙堂十尋木亦有幽篁春笋生顛倒横斜亂寒玉空庭月落蛟龍舞阿閣雲間孔鸞宿大德年中最熙洽四海無虞年穀熟聖人䕶念如慈雲粉金寫經五千軸呉興先生承詔起精藝東南遂空谷横窓曲几擅清雅寶氣龍香散芬郁我時布衣初到京隨客來觀嗟不足棲遲至大到延祐墜緒遺經䝉見録聖明天子心廣大仁孝東宫恊淵穆金殿朝囘即薦賢鳴鳳髙梧麗晨旭白頭寺主愛文學游親流水來相續黄鸝遶樹鳩喚雨晴絲入户階眠鹿中書右府尚多暇況復西清澹春服薊丘李公年甚髙親書篔簹試拈托南風堂上住多日好聽晨鐘赴僧粥枯梢長葉風雨來老可黄花俱眷屬揮毫相軋李河東共悼房山渺江陸曹南老商亦有名拂素先傾酒千斛蜀人仲淵不㑹畫側帽長吟動華屋蹇予冷撰從諸公兀然坐隅若鴻鵠風雲月露不計時聚散悲歡嵗年促汪侯何處得此圖其長丈餘髙尺六松檜蒼茫轉樹腰鐵石嵳峩偃山腹昔人不見今人老空憶臨風對森矗後來把筆誰最能閣下丹丘嘆幽獨令渠見此㑹傷神況我茅簷揩病目文章精彩寧復還天上華星光煜煜題寫生手卷贈李道山赴九江茶官春叢何窅窕翠竹題幽鳥秋實結甘酸溪鳬倚暮寒後日嵗復嵗盛年不留老將至湖上新亭早晚成可以供釣可以問耕看花食實老孫子擊鼓撞鐘歌太平一官黄蘆苦竹間琵琶船外月團團故人寫生一嵗事恐有離愁不足惜匡廬山好秋色歸持濃黛作脩眉牎下連卷數峯碧趙伯髙所藏楊補之松竹梅圖卉木何情同嵗寒君子合并嗟獨難氷霜滿地風景異清修古節來毫端南渡衣冠憶初合萑葦蒹葭總蕭颯長生玉立古顔貌欲選疎英變殘臘西都昔者畫功臣良工健筆隨風塵尺書黄髪共來往誰見留侯如婦人江上幽人有真跡俯仰興亡寫今昔丘園偃蹇非不多獨想髙懐淚沾臆鍾生清露軒江西諸侯好賔客彈鋏歸來無愧色學舍如舟安足居白髪秋風岸髙幘鏗爾舍瑟還讀書上天繁露垂庭除河清有頌芝有曲為我長歌傾玉壺與族姪孫從善白頭喜見族諸孫青門為世夫何言成都桑栢日已廢儘有遺書堪討論風花寒食江上路墟墓興哀慚一飱憐爾篤實可進學竭力孝敬思生存律詩五言出小東郭問訊成都宅還過萬里橋鄰牆皂角樹官路緑楊條部曲都無在茅茨忽見邀滄江沾白雪盡為夢魂銷望巴山巴嶺對秋屏依稀泰華形雙尖天際碧一色雨餘青牙纛穿行柏旌幢接降靈南昌漢時尉招與步空庭次韻葉賔月山居十首氷泮溪流碧雲生島嶼紅輕隂殘夢裏逺樹亂愁中鷗外兼晴絮鶯邊共晚風地偏山氣近霏靄濕房櫳落日亭前水飜風雨後荷翠簾明薄醉羽扇按清歌影浄鷗千頃涼生一作深蟻一柯扁舟成獨詠詩思尚能多露冷天光逼溪澄夜影圓水花含窈窕山吹縱清綿為覓洪崖侣重尋赤壁船翻愁孤鶴外迴互萬山連嵗晚氷生壑山深雪擁扄清齋須杞菊甘餌足參苓水繞階除静杉依石室青白雲麾不去晝影舞虚櫺緑鎖依松潤緗簾亂蘚斑吹笙花下散飛燕雨中還有客歸謀酒無言卧看山春禽忽相喚深樹兩關關綺疏收易卷紫盌罷分茶日煖聊行草風微好看花行窩君子宅懸榻故人家逺勝騎官馬聽雞趂早衙霜林收碩果雨檻卧幽芳留客山原枕分題玉井牀衣裘凝薄冷户牖宿殘香未覺成都逺風流獨草堂隠几風簷竹詩成酒病酥楓屯雲錦陣梅折海濤圖翠袖開筵出華簪折簡呼移舟促相就玉鱠斫生鱸簡冊驚前夢文章赴後期賞花時命駕愛竹屢題詩小草顛尤勝深杯醉不辭交游傾四海風雨夜吹箎風日宜芳嵗烟霞樂燕居坐深閒看月燭冷静修書臘醖紅生玉春盤緑間蔬但須門有客不問食無魚名酒名酒不可得幽花誰送來秋霜垂鬢髪夕照在樓臺盡日山公醉何年庾信囘喚人吹玉笛移席坐蒼苔無疑先生不逺千里訪某于寂寞之濵曽未旬日賦詩留别雖無以欵未忍從也次韻且致繾綣之私四首無疑先生南劍人養親無復日不忍愛遺生一客獨髙義千山致逺情烹魚供溉釡秣馬促歸程從此延津路應將問耦耕酷暑秋仍熾幽花晚自香誰將百年意共付一窓涼事業青燈舊心期白髪長山林儘迂闊江海正蒼茫望氣秋横劍分光夜續鐙寒梅不鬭雪春水盡融氷座與賢人對門從稚子譍鄉祠應合樂豪傑若為興薦書慚不用空復意憐才共逐雙鳬去誰飛一鶚催鼎彛文字在几杖見聞來明詔求遺逸蒲輪孰可陪題平逺趙公像將相先生舊江湖早退翁丹砂留劒客琴韻畣天工喬木荒烟合幽蘭宿雨同羅浮與衡岳猶想遇㝠鴻題疎齋盧公像持節江湖外吟詩魏晉間長庚垂野迥病鶴倚秋閒玉局謀堪奕金鑾遂不還春來無宿草㸃㸃涿州山次吳宗師韻題朱本初藏秀樓世傅垂紱裔蚤作采真遊引月池邊樹呼雲鶴外樓河圖留信史洛頌載歸舟無限吟詩興西山對九秋和龔子敬竹亭詩萬竹尚書宅髙亭表素襟扶持自逺大臨睡極髙深風露兼秋色梧桐共晚隂惟應有棲鳳餘韻寄瑶琴次韻馬伯庸少監四首仍嵗從巡幸山川識重臨講帷來濟濟馳道止駸駸五月衣裘薄諸生坐席深歸耕何待老莫問二疏金移蹕宫城曙烟花繞閣重來王俱屬籍稱使不傳􅇏賜席還清問囊書更手封恐煩宣室召視日轉蒼龍臣甫多愁思長歌拜杜鵑鑿崖通閣道積水放樓船惆悵霜横野栖遲雪滿顛經行看宿草碧色自年年太平知永日漸老惜芳晨論說慙孤學推揚負相臣退思常感慨拜賜每逡巡郊藪多閒地餘生託鳳麟題趙繼清詩稿禮樂三千字才名二十春緑樽清坐客朱紱苦吟身海日香浮樹淮雲暖向人同年多要地早晚接朝紳題草亭春雨夜鳴屋曉來青草生煖薫初舞蝶香近更啼鶯裁剪成書帶搴紉結佩瓊自非邵處士休放小車行奉别阿嚕威東泉學士遊甌越憶昔同經幄春明下玉除掛冠俄去國連舸總盛書筍脯嘗紅稻蓴羮斫白魚莫言江上逺咫尺玉堂廬寄白雲閒公講師古寺白雲閒鐘聲竹樹間唐詩留屋壁蜀道憶鄉關橘柚霜前送袈裟雨裏還重逢三十載刻石玉遮山書趙節度建炎誥勅後義旅趨京國危城藉宿勲山從官位改世以故家聞誥勅遺先代圖經補闕文凄涼寶劒贈元自岳將軍讀王伯儀參政中山周氏賑粟詩感嘆遂賦不作三年畜聊哉一日安素封能自富紅腐幸相完東里難為惠舂陵謾永嘆信知麟趾意秩秩寓周官次韻劉伯温送王止善員外四首某今春與止善員外約三月致仕同遊武夷既而聞其扁舟江上遂不及與之别監憲學齋公送以七言律詩一章五言三章逺蒙録寄不勝慨然蓋公之所賦所以激清風于古道發大雅于儒林止善平生遂有見于久逺所係亦大矣輒次韻四篇追寄止善亦以頌公之盛德拙陋不工録呈愧悚一笑幸甚故人歸去甚清華公有新詩在小車天外秋聲先鴈陣雲邊清夢過蜂衙未尋舊宅山隂竹更憶𤣥都觀裏花擬叙别懐題紙尾目昏書字愧欹斜公門無俗客相識已經年歸有亷車送人知國士賢詩隨官事少身與盛名全省署居清切何曽種秫田衣冠懐故老翰墨送初筵老有詩囊在家從室磬懸豈知清剡興不賦武夷篇千仭西山雪髙情獨爾賢攜書山寺讀深夜接猿吟秋水銀河影春雲錦瑟音尊前思北海世外愧南金禹穴堪尋否涼風起夕隂題黄思謙所藏雪窓蘭二首灃浦多芳草微風翠葉長墨雲開劒㦸香澤近衣裳書帶垂青簡􅋛珩委玉肪同心誰可並芝本産齋房手攬華鬘結化為樓閣雲幽人移近坐天女散餘芬九畹春光動三湘曉色分凌波送羅襪誰是鳳毛羣送董生赴仙居尉黑􅄠仙居尉登髙解賦詩海邊迎日觀花底詠風漪臺府多仙友詩書即吏師勤亷須自力慰我故人思寄段惟德憲副持斧雙溪上寒梅照髩華臨風懐鳳閣見雪憶龍沙夜訪山隂竹晨餐海上𤓰自嗟留滯久欲繼使君車酬崔御史送熊掌熊掌來東國分甘到老夫鸞刀寒斷節翠釡煖柔膚兔脱中山醢魚藏丙穴腴藜腸渾未厭玉食恐時須題金平章所藏竹石圖江水兼天碧篔簹滿谷生静和春雨重動挾晚風清投策看龍躍裁笙學鳳鳴千年倚磐石君子表幽貞周彦文野泉圖舊邑成新隠山泉喜發蒙涵容常不溢挹注詎能窮豹飾山光潤龍眠石氣通還應化春雨為澤豈言功逺法師圖像地浄縁心浄空真即性真白華無垢足金色化生身幽鳥時時現山花日日新願同陶處士相見過溪頻虎溪三笑圖入社心無適過橋迹邁存自嗟機事失空與畫圖論白羽秋風静黄花夕露煩詎能隨衆笑我亦付無言贈堯公開講鄱陽法席初鳴鼓龍天已滿空花飛檐外雨旛動室中風寶氣來天上金聲振楚東㸃頭無數石應是禮生公用唐綦母著作韻送閒白雲長老還吳凌空一錫歸幾日到禪扉花交珠樹䋄苔長石人衣秋水依空浄浮雲映日微白雲無所住此際亦歸飛寄吳宗師花發上陽紅宫袍醉晚風題詩酬怨鶴寫信寄飛鴻閶闔天光上蓬萊海氣中松聲一兩叠時寄看雲翁米元暉山水耆舊襄陽逺新詩問水濵苔磯垂釣久竹院訪僧頻書畫晴虹夜衣冠怪石春由來多健筆俱不寫紅塵雙駿圖真駿不受羈衝風忽競馳雪飜兩疋練塵引一編絲國士不並世神龍難力追故應雙劍氣昨夜起天池步雪圖白雪深無際蒼松近有關謝公穿屐去陶令荷鋤還鶴舞千瓊樹猨吟萬玉山若非有仙骨誰得此清閒踏雪圖送逺水橋滑山髙雪徑深乾坤無異色林壑有幽尋玉樹連雲起風泉落澗沈斷流無剡棹何以識山隂題黄太史書老將行因觀老將行壯氣酒邊生健筆凌雲起長歌帶雨鳴藏鵝歸浦迥瘞鶴入江清最憶青神應寒泉不世情周德尚見訪烏帽吟時側黄花對處閒詩成風雨外劍動斗牛間晝寂鸎啼樹春深竹滿山欣然聞好句多病愧柴關城山閣最愛臨山郡城中自有山雲邊開翠牖日上擁青鬟酌酒為親壽擎書待子還仙翁重相許可以樂髙閒挽胡伯恭令尹三首孔明雖少食安石自髙情丸藥黄鸝曉煎茶緑樹清劣能勝束帶俄復寫懸旌絲竹東門道凄涼忍重行歴歴言為教湛湛職有思誰能迎刄解真若治絲為閲世佳分子持平老吏師詔書詢守令空復薦章馳昔喜文書簡人知縣道真府君初在殯巷哭欲連村競渡哀魚鼈安居念犬豚小民猶識此遺愛豈空言題劉昇卿崇軒名園當郡右峻嶺視山隂鐘鼓清時迥鶯花列屋深臨池春洗馬對雪夜鳴琴監石多王謝髙軒每共尋覺非軒今日非昨日始覺昨日非龍光揮利刄鼠穴絶餘機德業收新效身心發妙輝空言成自誑何日聖賢歸題南禪寺壁南禪寺北峰林影動秋空畫意聲塵表吟情水觀中幽叢收墜露老籜下微風不有維摩詰誰能丈室同送長老住山持衣入祖寺彈指寶樓開白日交蛛網青山入鏡臺散花天女下行雨海龍囘應是飜經罷諸天送供來送憲史武子宣建鄴多名勝前朝自汲來車書逢盛日簪紱見英才撤棘秋闈散拈花晝殿開修能兼積孝令譽稱烏臺贈簡天碧畫士千仭青山裏和衣坐石苔看雲為雨去聽水共風來春盡揚雄老秋清宋玉哀故園誰賦得空對畫圖開重贈雲氣連山動松聲夾雨寒抱琴穿竹逕留棹倚江湍夕照歸神女春隂帶錦官此生舊同里偏解寫潺湲新作暖閣望陳溪山不至白雪滿虚空春生一粟中明窓塵帖帖圓鼎氣濛濛梅萼猶緘緑椒花欲獻紅誰能共來往惟有太丘翁正月十一夜坐春雷晝初發夜雨遂沈沈晚得隠居趣静知生物心佛燈依坐近神鼓隔林深老病都無睡詩成聊自吟暮春溪上作示涂振鐸久向山中住閒來上釣舟攜將青竹杖撑過白蘋洲稚子休相覓衰翁更少留東風吹雨起移繫屋西頭用趙壎韻示次子延年治生先務本為學必成章念爾應門早無能韞匵藏詩書家世重師友嵗年長尚念鳴幽鶴輕毛戒妄翔天藻亭壁下生二笋示幼子翁歸二首舍下生春笋兼旬丈尺髙為開鴛瓦脊放出鳳池毛覆屋通雲氣衝樓樹節旄連年雙碧玉聊寄一揮毫墓田雙瑞竹逺報謝鄉僧江上歸無日山中見未曽簡材生屋壁玉氣近書鐙茅舍秋風捲衝霄喜有朋到寺到寺無僧住鄰翁立暮雲喜逢新過客為説故將軍野水寒先涸殘鐘暝不聞欲知何代建然竹讀碑文夕照夕照散餘曛氤氲見物羣斗杓垂野迥空影界河分㑹弁懐瞻洛樓船憶祀汾荒村閒草木隨地有浮雲移柴門次韻薛𤣥卿老寄池邊舍新移竹外門髙人知獨樂妙語往相存衣食隨年嵗文章付子孫惟求綺園輩白髪共清尊答易小雅送商陸根商陸經年覓春深幸見分斸同黄獨雪坐對白花雲參术資芳澤芝蘭競宿熏道家空作脯寧與筍蔬羣織錦迴文詩宛轉千蠶緒綢繆一寸心文章遺彷彿情識墮幽沈春日關雎意秋風蟋蟀音文園空解賦終愧白頭吟題畫馬房家千里馬寫出渡江時煙霧連城起風雲六月馳尚方催進馭勇士不能騎苜蓿成秋草空寒太液池贈上清髙士吳霞所祕殿辭嚴直匡廬覓重遊喜逢飛珮客同上釣魚舟圖畫龍鱗濕衣裳鶴羽脩松聲過溪好為寫素絃秋題春塘謝公程文科第因時重人材致力專文園尋舊稿魯壁䕶殘編青紫空遺恨蟲魚更别箋運隨麟狩盡宴託鹿鳴先獨斷繇今聖賔興放昔傳詎聞深美意並世一陳前題秋山圖峰迥留深隠天清接素袍棲身斷人蹟遊目送鴻毛樹挂栖厓鷙藤懸飲子猱龍眠石澗冷虎撼樹根牢木客吟時共山樵奕處遭浮雲過水盡孤月挾霜髙羽使來三島胎僊舞九皋左招玉斧飲右攬赤松遨空色收寥廓虚聲起繹騷彈琴遺古散載酒棹輕舠遂向圖中見誰能世外逃乗槎幾月至一泛九秋濤哭熊昶之居官常獨處論事每平心獄用春秋斷囊無暮夜金家園聊伏臘江路足登臨名酒應常得幽人亦重尋築堤行冉冉修社坐深深環堵書連竹空林月照琴四年嗟契濶千載入沈吟陶令餘瓶粟黔生正斂衾孤兒承薄禄苦節奉遺音白髪秋多感青山夕已隂敦亷猶可望虚偽庶能箴郡乗誰傳信來車失所欽道園遺稿卷二
