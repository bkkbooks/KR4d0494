body:
  text: 道園遺稿卷五元虞集撰絶句七言次韻竹枝歌答袁伯長并序伯長歌竹枝以促歸棹且言僕故鄉與竹枝古調相近約同賦以發它日千里命駕之意因用其韻江水江花無盡期安得同舟及此時燕山春燕更北去南人休唱鷓鴣詞竹枝歌奉陪諸公送舊而歸暮聞短歌江上其竹枝之遺響乎因成四章江上婆娑作大招行人見者為魂銷使君若愛桐江住莫道長江無夢潮銅雀臺中朝暮思褰帷作伎望君來江頭只是須臾别何處多情更有詩憶奉君歡伎未成不承恩澤儘留情疑思却恐傷明德不敢人前哭失聲使君魂魄已飄風那復恩情更及儂自是人心難冷暖不辭江水濺衣紅題秋日蜀棠野堂青子來青鳥霜日清妍欲近人忽見嫣然紅數萼故鄉情思不勝春摘芙蓉明月丹霞是鏡湖緣茵隱約錦糢糊西風滿地吳王醉卧看樓前教戰圖見叔父南山翁二首先君萬死抱遺書付在諸孤手澤餘老眼欲枯那忍讀春霜秋雨一菴居奉承家祭若持危敢謂沖和在此枝館授淒涼勿惆悵百年門户豈吾私眉菴自賦二首家近眉山六十里晴時長見掃修眉老去思鄉歸未得故題庵子表新詩幾見雙眉采石亭如今頭白眼猶青昔人一去不復返聊寫山川作畫屏橫塘寺留題扁舟風雨暮投僧簔笠敲門七尺藤知我自來無所住一龕留供佛前燈洞庭湖楚澤吳山千里逺丹崖碧樹九秋髙何由身似雲間鵠橫絶江湖一羽毛晚過金山雲連山樹樹連村數筆元暉水墨痕吟苦不知身入畫更添白鳥破煙昏趙承旨躑躅畫眉山鳥春深不自由曉聲併作杜鵑愁東風綘筆多題遍不到離鸞桂影秋宣和馬圖凝神殿裏晏朝回間繫青驄照紫苔一日長安春事老可能無意看花來王朋梅東涼亭圖延祐中奉勑所作草也灤水東流紫霧開千門萬户起崔嵬坡陀草色如波浪長是鑾輿六月來方壺臨董元山水雨餘千澗共潺湲老樹橫橋任往還盡日春雲生不斷道人共對董元山息齋竹二首西清閣老薊丘翁愛寫疏篁㺯晚風玉殿不扄秋夜冷好看棲鳳月明中書帷晝捲下西清竒石幽篁步晚晴誰憶他年風雨外渭川蒼玉一絲輕寄張伯雨湖中春水白鵝羣長齋默朝三素君楊許寫經屋滿雪人間長史冠如雲寄薛元卿碧落曽有沈侍郎旋簮冠玉謁虛皇風流外史渾相似淡月疏星上建章寄欣笑隱無限江東日暮雲天宫説法夢中聞散花得見文殊相雪蘂玻璃手自分寄恩斷江娑羅雙樹曉森森曽對袈娑坐緑隂十載雲門那得見若耶溪水向春深寄王本齋揚州何處好吹簫海濶天空碧樹遙故遣湘江孤鳳去長吟休負月明宵寄斡克莊僉憲為懷同館西湖客不寄駝囊枸杞紅豈想往來江海上虛慿歸鴈問秋風畣斡克莊惠白氊白氊裁成鶴􅌁衣大茅山下向秋歸故人淮海應東望雪影翩翩入翠微别燮玄圃郭西山路有寒梅想見登臨首重回夜聽雨聲知水長滿船明月幾時開恭華道院納涼四首陳郎大扇大於箕欲使清風四海知應是蓮花峰側畔捫天仙掌舊攜持手持道書入山館長林無人月半落松花拂衣清露深長嘯他峰起巢鶴松風滿天山月髙躡雲一似駕海濤不知身是浮丘伯細哦四言吹鳳匏虹玉通天閲夜章不留榻上付仙郎一時誰解騎雲者乞與龍􅚷灑下方書蘇公帖後蘇木空聞蜀賈舟襪材還復望袁州畫又猶是黃岡竹細和陶詩飽即休坡翁謫黃州時月用四千五百錢日用不過百五十而猶有餘以待賓客蓋嵗計六十千耳今謫惠計嵗用須二百千蓋三倍矣日食萬錢者何人哉士君子不以窮乏纍其心而區畫亦盡人事皆中理之所為也夫子在陳蔡以子路之賢不能無愠見然處約之道君子小人之分見焉微子路無以發聖言矣觀蘇公此帖思當時之為此厲階者為之三嘆書先參政與黃浮山賦紫薇再花遺墨後春服初成念子孫紫薇堂上列芳樽當時髙興無人會兄弟通家尚未存書晚宋諸名公題墮淚碑詩後峴首亭髙故國詩飛一作臥龍無復更驅馳諸公盡向江南老遺恨長慚墮淚碑題宋淵聖宸翰倉皇內禪計全疏貞幹其如積蠱餘不敢身先君父死數封慈殿問安書跋劉光逺湘川行遺稿後白露橫江木葉秋故人相國況同舟賡歌自是當時體不與漁人共暮愁書子昻延祐間墨迹後三首奏伎宫中感遇深一時千載託微吟主家歌舞今誰在為疊春衣淚不禁細柳飛花拂曉風步隨輕輦過橋東道傍石馬迷芳草百囀流鶯入夢中曽學知章乞鑑湖恩深無分得蓴鱸扁舟一棹頭如雪芳草連天路欲無吳興公所書出師表心許驅馳奉至難書成揮涕試師干卧龍菴裏間風月惟有幽人字字看訪溉之不遇書壁城南不逢李太白壁間獨見蔡闕真方池古石淨如玉野鶴隔忩長似人丁卯禮部考試次韻先朝親擢總真儒列坐春官席不虛白首子雲天祿閣校文寧愧食無魚禁城鐘鐸已隆隆把卷猶看燭影同願得真才充國用庶聞質行化澆風憶昔坡頭接錦袍深堂披卷效微勞三年重得同清夜宫燭飛簾見月髙袍鵠鏘鏘赴曉闈分廬陳藝别東西慿教紅杏休開徹早晚開關踏雪泥固陵寒雀圖蕭條微命出蓬蒿飛躍無踰四仞髙阿閣鳳凰那類此畫渠能使聖躬勞聞子規花落故園聞子規春眠未起畫簾低常年五月居庸道愁共行人聽亂啼自述每懷衡嶽讀殘書似憶青城舊隱居萬一天恩憐賀監敕令何處結茅廬東家四時詞四首臨流洗研見長身白苧寬衣短葛巾紈扇自題新得句水亭分送倚闌人摩挲舊賜碾龍團紫磨無聲玉井寒鸚鵡不知誰是客學人言語近欄杆澄波千頃擁髙鬟手折芙蓉月下還解憶髙堂風露冷衲衣先送碧雲山賀雪宫門上表歸貂裘猶帶六花飛海南新送收香鳥轉覺清寒入翠帷絶句城南尺五野人居六月清隂八月如一色琅玕三百箇猶堪裁作殺青書金丹五頌靈槎八月自天來瞻望初陽歷斗箕白鶴青鸞相對引九霞光裏識真師手把金針徹夜縫鴛鴦繡出錦機空萬人如海誰親得製箇新袍似日紅桔橰軋軋曉煙凝破帽籠頭只自知重為祖翁添注腳可憐喫苦為孫兒等間拈取一丸泥補破扶衰信手為不因混沌顛落地問君那得火龍騎海上三山一徑微半間茅屋隔煙霏詩成應有題名處月裏長懷玉雪輝寄金陵蓬頭道人喧寂隨方接有生豈將欣厭係髙情一瓢玉井清泠水霜月晴虛候履聲道人聞步聲知某客至劉正甫周孟瑄遊華蓋回見訪緱嶺吹笙月色新玄都幾度碧桃春翩翩如雪雲林鶴雙引黃茅訪野人贈毛拱辰袖有題緘二十年攜看存殁重澘然神仙果得長生者合是身逢某宿纒贈蔣子中東州春水漾晴波誰序新分進士科好種梧桐千樹碧湖邊人識鳳曽過送夏大之教授還鄉二首禹憂洪水稷憂飢千古悠悠兩鬢絲誰與山林同白日行雲流水赴幽期應物紛紛興自髙不知官服是何曹歸歟耆舊遺聞逺莫憚登門弟子勞題黃晉卿上京道中紀行詩後少陵入蜀路嶇﨑故有凄涼五字詩供奉翰林隨翠輦應知同調不同辭題開元宫來鶴亭二首羣真終夜降華陽曽聽仙音近玉牀語罷是誰留别鶴待君寥廓共馳翔亭前春兩長蒼苔海上長鳴一日來從此琴心三疊裏月明長見影徘徊題明復菴二首玉臼搗霜月當户竹窗映雪書滿牀客來竟坐不交語自撥丹火燒山香皎皎霜鶴立齋厨蕭蕭風竹鳴庭除窗中有客自髙坐堂上真人方讀書清臯舊隱春雨初收水滿田村村桑柘緑生煙隱居聞在東臯上長見沙頭呼渡船題贈葉梅野并序近代楊補之作梅自負清瘦有持入德夀宫者內中頗不便于逸興謂曰村梅補因自題曰奉敕村梅集嘗見故家有藏徐熙墨杏花者用筆員潤有篆籕法亦恨楊不能知此也今監書博士丹丘生忽用此法寫生大快人意存渾厚之意于清真去衰陋之氣為纎弱所以為佳也譬如少陵繁花晴昊之雄壯視昏月淺水為何如耶樂平鍊師葉凱翁舊號野梅豫曰以野標梅未足盡梅之趣以梅名野庶乎廣莫之風請更曰梅野而以丹丘之畫冠之永作證據使錢唐臨江二君聞豫此論猶當俯首嘆服也虞集書昔結絲絇侍帝宸青鞋今許向江津慿君先對梅花説白髮相看意更親初凱翁先欲南還欲僕作詩送行而僕今先有行色故為題此它日一笑之資也雜題二首湘江風捲白蘋波北渚雲生帝子過欲採瓊芳渡江去翠衫輕薄晚雲多江上青山生白雲鷓鴣啼處有湘君行人來截昭華琯日暮青林玉氣分趙師舜所藏雪竹圖鳳凰臺畔竹漪漪别出參差玉一枝閲盡雪霜心似鐵髙風惟許嵗寒知西村山水一段雲山一段秋蹇騎尋壑更經丘他年投老終南去應向松間覔舊遊西湖畫景五雲樓觀日華東每踏紅塵氣若虹誰道小橋流水外數竿煙竹㺯秋風蒲萄葵花蒲萄翠帳絡明珠前列千葵旌節如應有南柯殘夢在一池鼓吹夜涼初池塘秋晚華蓋仙人漢殿臣厭朝朔望往來頻上方留舄秋江畔只有雙鳬卧白蘋天藻亭舍下生竹枝堂上不合生楓樹舍下何緣穿竹枝人間風日不到處長養鳳毛當及時青山白雲圖獨向山中訪隱君行窮千澗水沄沄仙家更在空青外只許人間禮白雲僧巨然山水晚煙橫樹轉溪灣何處漁舟罷釣還門外東風吹雪盡幽人同看巨然山畫竹不見髙人王右丞岐陽石客尚清真鳳毛染得春池水數尺新梢已過人題戈叔義墨竹江頭雨裏寫娟娟更作新梢入晚煙還有數竿題未遍龍吟清夜渭溪邊留題龍門寺二首頻採菖蒲石澗濱住山不厭亦無嗔先生尚有貪生意更憶松花問道人枯木寒巖絶色聲吟詩亦足未忘情不須更問臨川叟作得胡笳幾拍成題周場進士為南郭園林記後南郭名園才隔縣好添花竹及清時歸來未老柴車在百里尋春定可期寄謝臨川王正則録事少陵不待草堂資風雪空簷話舊思别去幾時春夜暖五峰燈火馬爭馳酬吳子髙諷爾宫詞十二篇小忩風雨正蕭然悠悠春夢無歸著黃竹遺墟雪滿天題魏雄卿齋壁晝雨瀧瀧銀燭懸秋聲滿屋陸成川赤髭大士談經罷白首尚書草太玄題畫黃葉飄零澤國秋煙波無盡使人愁騷人欲賦湘妃怨折得幽花寄逺遊南浦圖魏公幕府多豪俊文雅相從一舸中山雨浦雲都寫遍湖東更有灌園翁柯博士畫二首拔地參天獨老蒼幾年雨露更風霜新篁搖動多生色更待空庭月影長千年長蛟化為石蒼蘚枯槎角三尺亭亭玉立好兒孫長倚天風動秋碧秋江圖欲採蘋花隔逺汀舟橫不渡倚空青何由得似雙鸂鶒長攬秋光共畫屏紅蓼雙鳬五湖煙雨一扁舟泛泛聊忘去國憂最愛數枝紅蓼畔一雙文羽伴人愁畢公濟掀篷梅摘葉拈花夢不分誰能健步覔晴雲不須更待掀篷看全體東風舉似君題王闕所藏歐陽文忠公遺墨集古録跋尾盤谷尚存初刻字淮西無復斷碑痕琅琊幽谷花如錦恐有遺書卧竹根雙禽圖天上碧桃春冉冉人間翠竹晚娟娟雙飛不是青衣使何處東風一信傳臨王摩詰舊竹二首岐山鳳去已千年遺迹疏林翠羽鮮一段風流何處似終南秋色晚晴天千枝萬葉翠交加影落殘碑月映沙似是前身摩詰在紫薇花下角巾斜楊補之蘭九畹參差紫玉叢清江健筆總春風大夫宗國多憂思手把瓊瑰送斷鴻商德符畫曉陪劒履上嚴宸霜葉青紅日色新誰見江山煙霧起行吟澤畔老靈均子昻古木洞庭木落楚天長澤畔行吟最斷腸可是曲終人不見丹楓離立照滄浪子昻墨菊落木疏籬字字幽流傳摹刻使人愁滿城風雨歸來晚真見吳興一段秋畫梅風雪老嫩四首繁花千樹倚晴空不比疏枝冷雪中只為玉堂天最近儘將才思付東風老身如鐵心如水長與空山積雪期待得紅塵吹紫陌羣仙歸去已多時綽約肌膚迥出一作絶塵摩娑銅狄是何人已看天上千年雪不作人間一日春門户重重玉數枝娟娟靜好稱家兒舊時東閣多能賦説與揚州何遜知畫馬魯史曽聞兩驌驦開圖一見若龍驤驕嘶飛逐落花去沙草青青塞柳黃次韻王繼學題太乙二首山木深深晝掩扉時從髙處望雲飛幾番春雨還秋草送盡孤鴻獨自歸共騎黃鵠過蕭亭明月華星列畫屏記得當時祠太乙安歌疏節玉充庭送柴髙士南遊遍入名山採紫芝只餐秋露已忘飢東南際海羣峰盡欲向羅浮更覔誰贈傅與礪水玉空青不易求蘭苕翡翠擅清秋才情豈是人間少不到髙唐夢未休贈盧生録詩盧生來寫老夫詩老去深慙與世違華蓋白雲三兩句只堪獨咏莫傳知題范德機墨迹後凡骨蛻餘清似雪髙情起處一絲輕玉堂只在人間世回首蕭間愧後生種橘庭前嘉樹種來遲霜實經年未壓枝寄語巴園好相待商山更有一盤棋彭致中送松花幽人嵗嵗送松花指與吾人老已加欲學彭翁年八百鼎盛金粉養黃芽喜雨寄郡中諸官山馭東行應望霓吏民迎拜若雲齊到城慰滿三農意喜雨亭成太守題題表姪陳可立雜畫十首山崖嶻嶻澗嘈嘈四圍芳草亂青袍中間有箇支離木曲折無知夀最髙蕭蕭翠羽動晴虛知是南山長鳳雛莫道玉階風露冷要看千尺拂雲衢清江江上倚扁舟寫得琅玕一尺秋歷遍風霜如鐵石世人偏識老湖洲蠣房如山禦潮沙鐵網珊瑚浪中出何處龍孫好頭角亦玩明珠美風日南枝楚楚復娟娟此樹枯槎更可憐石角莫令牛礪角樵翁最後枕渠眠髙柳金絲積雨晴桃花灼灼隔溪明尋源若是忘機者鸂鶒鵁鶄總不驚百頃汀涵落日明稻田間水與隄平白頭想見荒陂去無數鳴蜩管送迎江潭木落鴈飛初已有秋聲動碧虛似是洞庭張樂地微風鷺翿立疏疏雪滿髙林水滿疇冥鴻亦為稻粱謀此時最憶江南岸一色蘆花看釣舟玉色臨池靜不言翛然翠袖共黃昏玉堂清冷無人到且對江南煙雨村贈朱本初霜雪摧殘澗壑非深根千嵗斧斤違寸心不逐飛煙化還作玄雲繞紫薇珥貂鳴佩入明光新墨初成進御牀草野小臣春夢短猶懷染翰侍君王延閣晨趨接佩聲又紆朱紱向江城丹心要似東陽水釀作宫壺徹底清頗愛燒香是鼻塵不應緣嗅又勞人方牀石鼎過清晝一縷山雲伴老身葛子熙欲往吳越售長安諸碑以危太朴書來求詩書尾餘空尚多佳紙極宜于書不忍劙絶之因題此詩贈子熙兼寄衆仲提學亦欲故人知吾得太朴也子熙養母極艱辛馳走東西又幾春我欲相留田舍近白雲不足療清貧漢唐妙刻出長安誰贈茅容具曉餐應有醉翁方集古千金不惜買琅玕浙都提學三年别我向山中每夢之定是盡拋書卷却緑楊紅杏樂清時流泉窈窕窗中畫檮杌蕭條袖裏書太白山深空積雪蓬萊海濶自晴虛子熙三嵗而孤鞠于舅氏長而為養甚至獨恨貧耳然苦節亦難能也虞集書寄朱環溪賢郎肯為諸生出不厭闌干苜蓿盤為有平安花竹報齋居日日共清歡髙堂修祀灌園翁白髮清樽見古風曽得遺文窺隱德猶今視昔後人同悼亡四首買臣不綰會稽章井臼終身愧孟光縱有他年千石酒寧知當日一杯漿地中代我奉慈幃一去無由再見之欲覔音容須夢裏先生無睡已多時十載思君久别離歸來忽作死生期孤鐙夜雨深深坐正似燕山恨别時比似燕山恨别時鬢邊添得雪絲絲秖今心事真如水可得才情更賦詩次陳溪山韻三首山深松竹俱成老溪迥蒲荷各自花隨分樂天無一事擬求齊物度南華枝有蒼筤實有梧何年鳴鳥下晴虛惟應長共希夷叟日對朝陽浴海初清渭終南路杳冥漁磯樵徑草還青山中雨足黃梅落獨為相求出户庭維摩文殊城裏普熏香積飯室中同供妙天花清涼山上千年石猶結慈雲候翠華達摩萬里西來言不契九年壁底影為雙等間風信生蘆葉雲散青天月滿江何奉議子路問津圖日向雩壇詠暮春無言可以諭天真堂堂正道行將去勿傍他門别問津荷蓧圖道上相遭荷蓧翁殺雞留宿甚從容如何不及乘桴意更待重來果不逢李陵别蘇武老羝已乳鴈書傳去住初分哭向天明日節旄歸漢地將軍應是獨澘然羲之觀鵝剡溪春雨曉生波道士扁舟肯見過換取黃庭歸别館人間長憶鳳文羅孟浩然風雪髙堂破帽溫七人圖裏一人存昔時耆舊那堪論獨釣槎頭最斷魂和靖行吟擁鼻微吟午夜清心空與月合圓明無端却作梅花想著影緣香夢不成陶榖烹雪烹雪風流秖自娛髙情何足語家姝果知簡靜為真樂列屋間居亦不須醉翁亭圖醉翁四十謾稱翁賓客相隨樂意同前引朱衣垂白髮花開山谷幾春風原泉圖九天飛瀑下巖幽去作江湖萬古流倚杖不知春雨過青山如洗暮雲收贈王自得江上秋風日夜深丹楓烏桕總堪吟可能阿閣承朝日玉作參差學鳳吟送余道士三首憶昔遊京最少年等間詩句被人傳君今似我當時面玉雪春風上客船諸老愛賢飢渴如才華誠美豈容虛子當徑上蓬萊閣遍讀人間未見書應有多情問故人為言溪上上船頻春來雨過清如鏡照見蕭蕭白髮新延祐三年過金鴈欲訪諾公以王事不果今二十年昔禮岩頭諾詎羅寶香猶在石盤陀上人幾嵗離金鴈海月江雲㺯碧波寄謙上人不見謙公二十年石橋依舊駕晴川定應和盡寒山集倘許人間一句傳寄曇芳笑隱優鉢曇花一度開梵天帝釋自拈來人間讃歎那能盡慚愧文殊大辨才寄光雪窗桫欏軒中少塵事恩公昔共兩青藜只今主人相憶否風雨扁舟覔舊題宿天寧寺丈室千函貝葉書疏篁幽鳥在庭除道人久不到城府愛此渾如澗谷居間白雲上人自吳中來訪表姪陳可復畫其像因題之曰遍翻寶藏晝垂簾三載歸來白髮添萬斛春泉磐石坐龍宫又擬借華嚴題馬九淵墨龍曽乘雲氣九天行振鬛揚鬐海嶽驚變化已隨雷電逺作成霖雨慰蒼生題了堂上人所藏雲屋圖鎮日秋風草屋欹海潮聲上接天池白雲捲盡青山在衲被蒙頭總不知題袁誠夫所藏山水二首十百相連底處山雨雲時復到人間山中草木自寒暑長與幽人相對間海外誰云更九州駕言從此泛扁舟垂綸未必悠悠者帶雨看潮散暮愁墨梅霜月清江一棹過誰將長影照寒波浮雲日暮長安逺莫羡宫粧掃翠蛾孩兒桃書樓春晝雨繽紛一樹桃花思不羣彈指樓開當日面莫教童子是靈雲洪崖橋二首澄江如練碧悠悠一色蘆花覆逺洲無盡春天歸鴈急月明寒影不曽留橫橋攜手踏溪流無盡清流意自幽天外浮雲飛鳥散柳隂猶有釣魚舟五絃琴詩為劉子雨賦二首海上微風動五絃九疑蒼翠雨餘天仲尼昔日聞韶地肉味都忘思惘然錦瑟無端五十絃五音繁會亂春筵不知簡易髙人意目送歸鴻碧海天次書巢雜詩韻四首北巷髙齋滿硯氷柴門誰許小童譍幽人自得延年術不信昌陽是豨苓坐上清尊日不虛長歌誰嘆食無魚主人何物為生計五尺危巢萬卷書一檠金粟長靈芽不待春風自放花收拾黛煤和玉屑昔時眉嫵是君家客來相對飲無何客去杯羮手自和未許傍人空笑老誰知小屋得春多題畫銀鼠為裘著來早八月逐兔山隂道衰草蕭蕭風露寒將軍鬚鬢一時老畫松天池昨夜風雷起千尺渴蛟餐石髓神君叱之不敢去影落吳淞半江水漁樂圖江上青青列數峰千重樓觀楚王宫為雲為雨無朝暮卧看當年屬釣翁捕魚圖數罟臨溪晚不收蘧廬三尺抱寒愁金鱗自在江湖上煙雨重重具釣舟百牛圖妙手精思盡百牛古來遺事總堪求一牛耕罷無消息野水間田不見收畫虎目鏡耽耽鎮坐隅髙堂白晝走睢盱良工不寫凡毛骨驚世文章斂若無畫鶴海風吹月憶危巢清夜梳翎月墮坳仙客不知猶是畫每聽長唳向松梢息齋墨竹二首江上秋風已滿林玉階夜色自蕭森并刀剪得瀟湘雨獨上蒼梧學鳳吟秀出千林思不羣獨含春雨對江雲平津若有歸來劍定化雙龍起夜分蘭水生灃浦碧𥻘𥻘沙際修叢數嵗春莫怪山林蔬笋氣清芳端合屬幽人雨竹木落江潭湘水秋雨痕多付竹翛翛黃陵廟裏猿啼夜何處能銷宋玉愁村夜上元作滿城簫鼓暮相催田父村南醉未回野廟殘燈燒未盡霏霏山雨逐人來送艾幼青歸臨川幼清手録唐文藝吟誦寒鐙過夜分秋菊春蘭隨物轉獨臨野水拾殘雲昱上人盆竹二首霜枝一寸筍如針亦有蒼然萬古心還憶道人分種日瘦笻八尺度千岑我憶蠶茨萬竹叢吳中還見小玲瓏居然風露千林曉猶稱行吟白髮翁題夢良梅并序夢良墨妙近倣清江時出晴昊之繁稍以充潤其清苦此卷乃又淡泊相遭之極者也把玩久之夢良自稱錦屏山人蓋與豫皆蜀人也嵗月相望雖久寧無故鄉之思故為賦此汀煙冉冉竹重重老樹疏花吹曉風壯遊燕薊今白髮憶踏江船如夢中茆簷曝日歸來晚野水荒雲誰是伴一枝已見故人心三尺未愁橫幅短述懷四首青鞋踏遍莓苔迹萬里橋南風瑟瑟一雙白鷺也多情隔岸飛來如送客畫橋南畔行人立蘆葦蕭蕭船去急雲連北闕與天深月一作秋落西山和露白玉煙惆悵江波隔夜夜流塵空寶瑟可憐蓬鬢已驚風好在葵心猶向日菱花半掩無消息腸斷城頭秋月白故園能隔幾長亭羌笛一聲歸未得道園遺稿卷五
