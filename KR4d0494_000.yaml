body:
  text: 道園遺稿别集類四元提要臣等謹案道園遺稿六卷元虞集撰集平生所為文凡萬餘篇門人李本編為道園學古録五十卷有劉基所刻大字本又有烏克章所刻建寧本後人又編其詩文曰道園類稿與學古録互有出入此遺稿一編則其從孫堪補輯也凡古律詩七百四十一篇附以樂府刻于至正十四年其中有類稿已載者百餘篇而類稿所無者尚五百餘篇集之詩文為有元一代冠冕而稿多散佚當李本編學古録時已有泰山一豪芒之歎堪續加搜訪用心甚勤雖不能搜括無遺然其挂漏者亦已少矣又考黃溍序學古録以為集所手編而此書前有至正已亥眉山楊椿序以為集季子翁歸及其門人所編與李本序合蓋集母楊氏為衡陽守楊文仲之女楊椿即其外家後人其言自當無誤亦可證黃溍所云之不足據也虞堪字克用一字勝伯隱居長洲明洪武中嘗為雲南府學教授好學有文所著有鼓枻稿已别著録云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀道園遺稿序自昔文章家著述之盛其集有內外前後續别之分蓋由其體製有同異嵗月有早暮故其編纂彚次之法各有所存然其文之可傳者雖片言半簡皆不得而棄置又復有所謂拾遺者焉國朝一代文章家莫盛於閣學蜀郡虞公公之詩文曰道園學古録者其類目皆公手所編定天下學者既已家傳而人誦之矣然其散逸遺落者猶不可勝計也其從孫堪乃為博加討訪積纍之久得古律詩七百四十一篇而吳郡金君伯祥為鋟諸梓是編之傳其殆所謂拾遺者乎豫嘗獲執筆從公之後而竊誦公之詩以為國朝之宗工碩生後先林立其於詩尤長者如公及臨江范公蓋不可一二數也學者讀乎是編則知其殘膏賸馥所以沾丐後人者多矣今公已不可復作豫是以三復是編而為之永慨也抑公平生所為文無慮萬餘篇今道園録中所載不啻十之三四而已然則并加討訪而使之盡傳焉豈非堪之志而豫之所深望者乎是故昌黎之集成於門人河東之集託於朋友惟廬陵歐陽公之集其嗣人能致其力焉若堪之汲汲於此其亦可以無愧於歐陽氏矣堪字克用一字勝伯好學有文能世其家而公之行能官伐已具於歐陽內翰所為碑銘兹不著至正二十年正月十日金華黃溍序先叔祖學士虞公詩文有道園學古録翰林珠玉等編已行於世然竊讀之每慮其有所遺落凡南北士夫間輒為搜獵求之纍年始得詩章七百餘首皆章章在人耳目及得之親筆者蓋懼其以偽亂真故不敢不為之審擇也惟先叔祖鴻文巨筆著在天下家傳人誦其大篇大什諸編蓋已得其八九此蓋拾遺補缺庶免有湮沒之嘆方類聚成編以便觀覽而吾友金伯祥乃必用夀諸梓以廣其傳命其子鏐書以入刻伯祥之施不其永耶外有雜文諸賦尚有俟于他日云至正十四年五月甲子從孫堪百拜謹識
