body:
  text: 道園遺稿卷四元虞集撰五言絶句漁樵耕牧四咏漁子正垂綸烟江曉色新舉頭看叠嶂那識武陵人我本青城樵偶然嬰世網谷口夕陽收髙歌與長往淋漓春雨足緑野趂歸耕尚有泥塗者山深獨自行寒林有歸牧隱約牽黃犢一笛晚風清吹成太平曲題子昻五馬圖虎革裹干戈華陽春草多天間五龍子隨意浴晴波趙大年小景二首野老江頭住重重落木坡驚鴻隨雪起獵騎晚相過江上稻粱熟滿川鴻鴈來飛鳴各自適落日在髙臺題黃西蔍翁石上松千尺橋西水一灣杖藜從此去隨意看青山題柯敬仲雜畫五首玉立一長身風前倚翠顰茂陵頭儘白賴有李夫人舞影彎彎月歌聲剪剪雲恐隨風力去留取翠綃裙江波傳雨意山石長雲根琴瑟分清潤階庭列子孫氷解滹沱動雲分碣石開漁竿秋裊裊還見渭翁來不見丹丘久驚看翰墨香永懷書閣舊春日繡簾長子昻桃花馬一匹桃花馬飛來不動塵銀鞍􅀈教好賜與虢夫人題馬學士詩後雨露春無際風沙盡日寒多憂能賦客空老采詩官京師秋夜風竹撼秋聲天寒夢不成如何今夜月偏照客窗明題雜畫三十首黃蜀葵花萼立清晨鵝黃向日新金杯承玉露偏醉蜀鄉人白芍藥金鼎和芳柔灤京已麥秋當階千本玉看不到揚州海棠睡起多情思依稀見太真一枝紅淚濕似憶故宫春山茶萬木老空山花開緑葉間渥丹深雪裏不作少年顔芙蓉丹霞覆苑洲公子夜來游終宴風露冷折花登彩舟荷花澤國三千女西風擁翠寒誰能却髙蓋正面與君看著色竹髙節琅玕直長梢翡翠低東風數竿笋早晚與人齊著色蘭采秀此山間風來翠被寒三清降瑞雪盛以紫瑛盤墨蘭霜風委蔓刺獨秀騷人國世多色自媚吾𤣥尚吾德玉韞不自獻清髙伴幽人芳榮此時來中有無邊春子猷訪戴半夜輕舟發清興豈在雪不見主人翁來往謾騷屑曹溪昔有客無來去何速祇緣相見後乃為留一宿蘇李泣别落葉滿長安秋風漢節還裁詩寄歸鴈三月到天山西子游湖步屧微風動停橈落日低夜深歌白苧咫尺越來溪蕭史鳳臺明月在髙臺雙吹紫鳳來天髙風露冷銀燭畫屏開襄王夢夢尋巫峽雨雲入楚王宫何以永今夕倐來隨曉風梅梢月斜月在闌干疏花共嵗寒同來攜白鶴不似玉堂看幽禽老石為誰媚幽花兩清麗春深不見人聊為五禽戲雪茶雙雀玉茗深宫裏春妍帶雪殘可憐五色羽相並不知寒荷葉雪姑雪羽兩飛鳴輕輕不自驚荷盤滿載露更立不成傾梨花靛甕剪水作梨花東風日未斜不慿青羽使那望五雲車荔支山鼠紅塵八千里始得薦金盤汝黠獨無畏輕紅啄曉酸並鵲雙玉報朝晴花梢墜露清永懷書閣舊春日繡簾明天鵝校獵上林苑回身太液池白雲去不返雪影下荒陂鴈戢羽橫烟暮遺音折葦秋衡陽千頃水汾曲一荒丘鵝夜雪軍聲急春池筆陳髙波清翻茜掌沙淨卧霜毫鴨亂喋疑將鬭能言故不烹秋江寒並影春水緑同生烟波釣舟依約米家船疏林泊暮烟新詩吟未了槎上釣江鯿荷鍤圖天地一醉鄊今古有誰醒拚死劉伯倫令人發深省蘭蕙圖衆芳非不多金石好兄弟雜佩以問之春風接襟袂題何玉泉錢塘詩卷後何精地理術青山到海盡神氣欲天浮寂寞舂陵叟蒼梧雲正愁地寶不敢愛人工毁天完開闔大呼吸生氣方盤桓楊友直湖亭東湖亭子上太守醉時歌為問花千樹何如洛下多絶句六言題江山烟雨圖千村春水方生萬里歸帆如羽不知誰在層樓臥看江南烟雨黼黻文章如此慘淡經營者誰希微那可致詰色空了不加知柯博士竹樹古石江潭木葉盡落巫峽竹枝更長剪取微風疏雨橫吹殘月清霜石帶苔而蒼翠竹垂雨以珠璣藉玉五紋之組析旌六羽之翬趙承㫖蘭石僧日觀蒲萄天人潄凍芳潤野老沉吟屈蟠南國烟生玉暖西涼酒熱霜寒趙承㫖畫松灑霏烟之餘馨見蒼龍之一體森紫髯之如㦸激清風而直指題聶空山扇客來山雨鳴澗客去山翁醉眠花外春雲藹藹竹邊秋月娟娟道園遺稿卷四
