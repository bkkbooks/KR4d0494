body:
  text: 道園遺稿卷六元虞集撰樂府燭影摇紅淮南故將軍家有歌姬才容自許善自度曲歐陽守淮南姬為將軍願一見公竟不及見而卒客有為公賦此曲者雪暎虚檐夢魂正繞陽臺近朝來誰為䕶熏籠雲卧衣裳冷應念蘭心蕙性對芳年才華自信洞房春暖換羽移宫珠圓絲瑩板壓紅牙手痕猶在餘香冺當時惟待醉翁來教惜聴鶯聲可引惜閒情未領但雕梁塵銷露瞑幾回清夜月轉西廊梧桐疎影蝶戀花故遼主得其臣所獻黄菊賦題其後云昨日得卿黄菊賦細剪金英題作句袖中猶覺有餘香冷落西風吹不去二月末與楊鎮庭陳衆仲觀杏城東坐客有為予誦此者因括櫽歸腔令佐酒者歌昨日得卿黄菊賦細剪金英題作多情句冷落西風吹不去袖中猶有餘香度滄海塵生秋日暮玉砌雕闌木葉鳴疎雨江總白頭心更苦素琴猶寫幽蘭譜賀新郎五月中以小疾家居陳衆仲助教言乳燕飛華屋調最宜時連度數曲病其詞妙則聲劣律稳者語卑適有友人期家人到官所而不至賦此丹荔明如火想江城薰風乍透繡簾青鎖寳篆香銷初睡起葉底流鶯又過算幾度思歸未果欲剪氷綃慿誰寄恐腰圍漸減愁無那臨岸曲命舟舸涼宵冉冉銀蟾墮望清輝千里照人霧底雲軃凖儗雕梁棲飛燕早晚新巢定妥歎會少離多似我留滯文園頭先白念琴心久為芳塵鎖將舊恨歸江左風入松為莆田夀頻年清夜肯相過春碧捲紅螺畫檐幾度徘徊月梁園逈無復鳴珂門外雪深三尺窻中翠淺雙蛾舊家丹荔錦交柯新玉紫峯駝長安日近天涯逺行雲夢不到江波欲度新詞為夀先生待教誰歌鳴鶴餘音全真馮尊師本燕趙書生㳺汴遇異人得仙學所賦歌曲髙潔雄暢最傳者蘇武慢二十篇前十篇道遺世之樂後十篇論修仙之事會稽費無隠獨善歌之聞者有凌雲之思無復流連光景者矣予登山每登髙望逺則與無隠歌而和之無隠曰公當為我更作十篇居兩年得兩篇半殊未快意也昭陽協洽之年嘉平之月長兒之官羅浮予與客清江趙伯友臨川黄觀我陳可立㳺東叔呉文明平陽李平幼子翁歸泛舟送之水涸轉鄱陽湖上豫章遇風雪十五六日不能達三百里清夜秉燭危坐髙唱二三夕間得七篇半每一篇成無隠即歌之馮尊師天外有聞能乗風為我一來聴耶明春舟中又得二篇併無俗念一首後三年仙游山彭致中取而刋之與瓢笠髙眀共一笑之樂也道園道人虞集伯生記蘇武慢十二首自笑㣲生凡情不斷輕棄舊磯垂釣走馬長安聴鶯上苑空負洛陽年少玉殿傳宣金鸞陪宴屢草九重丹詔是何年夢斷槐根依舊一簔江表天賜我萬疊雲屏五湖烟浪無限野猿沙鳥平明紫閣日晏𤣥洲晞髪太霞林杪蒼龍騰海白鶴衝霄顛倒一時俱了望清都獨步髙秋風露動天初曉掃盡風雲綽開塵土落得半丘藏拙青松為葢白石為牀一切物情休歇幾度蓬萊布袍長劍閒對海波澄徹是誰家酒熟仙瓢邀我共看明月歸去也玉宇寥寥銀河耿耿鐵笛一聲山裂三花髙擁九炁彌羅縹緲泰清瑶闕手把芙蓉臨空飛步今夜幾人朝謁便翻身北斗為杓徧散紫甌香雪山月來時海風不動平地玉樓瓊宇桂子飄香露華如水自按洞簫如縷杳杳冥冥泠泠厯厯青鳥解傳芳語太㣲中鸞鶴相求盡是舊時真侣君聴取列豹重闗鼓雷千吏天界更多官府石女簮花木人勸酒為我此間聊住髙唱㣲吟揮毫萬丈塵世等閒今古看空山一色青青何意斷雲長雨皓月清霜釣舟如葉閒渡小溪澄碧銀漢無聲玉虹横埜斗柄正垂天北半幅烏紗數根華髮一緉野鳬飛舄回問仙人南老樹能見幾回今昔西華頂十丈髙花九天秋露結就翠房瑶實脫屣非難凌空何逺三咽雪融氷液辟穀神方餐霞真訣一去更無消息笑人間長住虚空誰似一輪紅日放櫂滄浪落霞殘照聊倚岸迴山轉乗鴈雙鳬斷蘆漂葦身在畫圖秋晚雨送灘聲風摇燭影夜深尚披吟卷算離情何必天涯咫尺路遥人逺空自笑洛下書生襄陽耆舊夢底幾時曾見老矣浮丘賦詩明月千仭碧天長劍雪霽瓊樓春生瑶席容我故山髙燕待雞鳴日出浮羅飛渡海波清淺對酒常歌無愁可解是箇道人標格好風過耳皓月盈情清浄水聲山色世上千年山中七日隨處慣曾為客盡虛空北斗南辰此事有誰消得曾聴得碧眼胡僧布袍滄海直下釣絲千尺掣取鯨魚風雷變化不是等閒竒特寒暑相摧乾坤不用厯刼不為陳迹可憐忘却髙年長伴小兒嬉劇憶昔坡仙夜游赤壁孤鶴掠舟西過英雄消盡身世茫然月小水寒星大何似漁翁不知今古醉傍蓼花燃火夢相逢羽服翩􅗁未必此時非我誰解道嵗晚江空風帆目力横槊賦詩江左清露衣裳晚風洲渚多少短歌長些玉宇髙寒故人何處眇眇予懷無那歎乘桴浮海飄然從者未知誰可十載燕山十年江上慣見半生風雪對雪無舟泛舟無雪不遇並時髙潔斷港殘沙今兹何夕一似剡溪歸越但掀篷數尺梅花人跡鳥飛俱絶君不見五老危巔浮丘絶頂笑我早生華髮返老還童易麄為妙定有九還丹訣霽景浮空天光眩海一體本無分别便堪稱六一仙公千古太虚明月歸去來兮昨非今是惆悵獨悲奚語迷途未逺晨景熹㣲乃命導夫先路風颺舟輕候門童稚此日載瞻衡宇酒盈樽三徑雖荒松菊宛然如故聊寄傲與世相違舊交俱息更復駕言焉取琴書情話尋壑經丘倦鳥岫雲容與農人告我有事西疇孤櫂賦詩春雨但樂夫天命何疑乗化任渠留去六十歸來今過七十感謝聖恩嘉恵早眠晏起渇飲飢餐自己了無心事數卷殘書半枚破硯聊表秀才而已道先生快寫能吟直是去之逺矣沒尋思拄箇青藜靸雙芒屨走去渡頭觀水逝者滔滔來之衮衮不覺日斜風細有一漁翁驀然相喚爾在看他甚底便扶杖穿起鮮魚博得一樽同醉一徑通幽畫屏横翠行到白雲深處世外蟠桃井邊佳橘别有種萱瑶圃檀板輕敲素琴閒弄奉獻鳯膏麟脯舞翩翩鶴髮飄飄仍是舊時仙母君看取華屋神仙滿堂金玉此是蟪蛄朝暮五色蓬萊九秋鵰鶚别有出身之路酒熟麻姑雲生巫峽稽首洞天歸去任海波清淺無時何處綠窻雲户雲澹風輕傍花隨栁將謂少年行樂髙閣林間小車城裏千古太平西洛瞻彼泱泱言思君子流水儼然如昨但清遊天際輕隂未便暮愁離索長記得童冠相隨浴沂歸去吟詠鳶飛魚躍逝者如斯吾衰甚矣調理自存斟酌清廟朱絃舊堂金石隠几似聞更作農人二合告我有事西疇窈窕掛書牛角無俗念十年窻下見古今成敗幾多豪傑誰會誰能誰不濟故紙數行明滅亂葉西風遊絲春夢轉轉無休歇為他憔悴不知有甚干涉寂寂無住閒身盡虚空界一片中宵月雲去雲來無定相月亦本無圓缺非色非空非心非佛教我如何説不妨跬步蟾蜍飛上銀闕附全真馮尊師蘇武慢二十首其一飯了從容消閒䇿杖野望有何慿仗帆歸逺浦鷺立汀洲千樹好花㣲放芳草池塘錦江樓閣隐隠雪埋青嶂向東郊極目天涯不見故人惆悵歸去也翠麓﨑嶇林巒掩暎消遣晚來情况幽禽巧語弱栁摇金綠影小橋清響揮掃龍蛇領畧風光陶寫丹青吟唱這雲山好景物外烟霞幾人能訪其二終焉返照迴光終焉活計何處可為依託凋零鄭圃竹塢松溪林下勝遊行樂霞女雲朋水色山光幽隠烟蘿巖壑更堂堂氣概摩天一㸃浩然寥廓堪愛處蝶戲花梢苔生石徑風細日髙簾幕清虛器量咀嚼乾坤髙邁市朝歡約疎葛寛裁瘦玉横拖笑傲東籬吟酌把真情欲寫奈何塵世故人蕭索其三歸閒識破塵寰凡籠跳出飄蕩應無拘束萍蹤自在雅操孤髙還若野雲麋鹿遇坎乗流混俗和光知止有何榮辱恣陶陶海上人間不管嵗華催促從此後筆硯生塵蠅蝸絶念安分翠㣲雲屋般般放下事事都休静對小軒梅竹一味疎慵萬古淳風便是真常清福任羣情晝夜世路奔波競争蠻觸其四得晤夢斷槐宫倚天長嘯勘破物情今古擔簦暎雪射虎誅龍曾把少年身悞金谷繁華漢苑秦宫空有落花飛絮歎浮生終日茫茫誰肯死前回顧麈争似我玉麈清談金微雅弄髙卧洞天門户逍遥畎畝肆任情懷閒伴蓼汀鷗鷺收拾生涯紫蠏黄柑江上一簔烟雨醉歸來依舊蘆花深處月明幽浦其五通真試問禪闗恭求無數徃往到頭虚老磨磚作鏡積雪為糧迷了幾多年少毛吞大海芥納須彌金色頭陁㣲笑晤時超十地三乗凝滯四生六道誰聴得絶相巖前無隂樹下杜宇一聲春曉曹溪路險鷲嶺雲深此處故人音窅千丈氷崖五葉蓮開古殿簾垂香裊免葛藤叢裏老婆遊子夢魂顛倒其六明道出世登真須慿剛志决要頓開雲慧消塵止念絶愛忘憂恬澹自然知味雷震一聲火發三田半夜烏飛千里透簾幃鼎鉛温温恣飲玉壺香膩堪下手䇿鳯攀鸞烹金間木遊賞洞房佳瑞傾光吐秀寒海衝山真氣遍充天地乗履風雲摘騎日月不比尋常兒戲把𤣥珠收取大羅歸去聖賢同域其七施設大道幽深如何消息説破鬼神驚駭挾藏宇宙剖判𤣥真樂世間無賽靈鷲峰前寳珠拈出明顯玉般光彩照乾坤上下羣生知者夀同山海最至極翠靄輕分瓊花亂墜空裏結成文葢金身玉骨月帔星冠符合水晶天籟清静門庭聖賢風範千古儼然常在願學人達此希夷㣲理共遊方外其八退藏避世安時同塵處順淵黙至人誰識鶉居鷇食蘚逕蘿龕深宻養亷寕極浮定有宜出入無方逆順神機難測樂簞瓢笑傲林泉未肯折腰形役當此際棐几松鉛唇歌舌彈渇飲玉壺春色一懷皓月兩袖清風真箇箇中消息方外生涯静中意味不許等閒攀摘待迷雲吹散玉繩髙潔自知端的其九堪歎羣情迷津宛轉飄蕩甚時休歇争頭競角抵死澷生一向戀家貪業利鎖名韁慾浪恩山酒市花衢顛蹷騁僂儸似蟻循環不念鬢華如雪誰肯向大朴林中無為鄉裏閒伴老𥅆莊列珠獲象罔夢斷華胥髙枕洞天日月三界廓然八表冲虚湛湛靈光通徹這逍遥刼外妙哉真樂世間難説其十過隙年光如毛塵事暗把物情移換浮生擾擾背覺隨塵酒色利名縈絆慿君取厯代英䧺楚越周秦唐漢謾遺留壞塜頽碑千古是非不斷蚤悟碧玉壺中白雲堆裏别有翠霞宫殿三尺雅會五彩光攅朝赴紫㣲瓊宴閬苑瑶池絳闕清都信任逍遥游翫笑愚頑苦海販骨無休往來流轉十一悟入曹溪鶴冲霄漢雲水道人活計臨川舉檝對境擲鈎澇漉錦鱗紅鯉風送漁舟透闕雙峯影裏駭然明霽見烟霞極目金丹一粒貴珍難比𤣥妙處太一含真𤣥元成象昇降箇中無滯堅持九載志練三千精進五華瓊液多在靈源洞徹神光真境了然超彼這長生久視天機深奥上仙真理十二創建靈壇初脩丹竈保養太和真命風生虎嘯火起龍騰燮理要依時令金木交併斗闕天闗旋繞滌除心徑覩𤣥珠一粒流霞閃爍送歸金鼎壺内景造化希夷𤣥機要妙㸃製魄仙魂聖元中體用㫖裏明真悟得本來真性還返無窮漸入青陽仙境照盈虚静這一輪明月百年蒙蔽豁然開瑩十三運炁吞霞乗風飲露須列五雲為則南山赤鳯北海烏龜堅志用心永得銘闕相迎造化爐中烹就一丸端的這隂陽神用虚無長養浩然消息𤣥闗悟到此方知肓聾耳目得遇至人開剔用符妙道黙運𤣥機瓊液轉流益增雲水清閒太虚空寂寥廓本無蹤跡這金丹一訣平生疑難渙然氷釋十四日月髙奔金波滿泛七返九還延祚真精應物大道潜身恍惚妙通𤣥路直待陽生造化神丹龍虎紫霄天府這瑶函寳篆天機須仗至人開悟長生道固蔕深根仙家活計烹煉汞鉛為務鑪輝五彩鼎耀三光識取本來宗祖明月樓前覩箇金蟬飛舞翠峯明宇把凌雲一志精誠精進上仙科舉十五元氣充飡麻衣遮體萬事轉頭何濟黄芽白雪黒水紅雲軒帝注傳名世深謝名師説破希夷妙理本來精粹抱仙胎養就雲𨫼繚繞萬神咸備持造化箇箇圓成人人具足一炁返還資質周遊八境遍賞三山不離目前親詣堪笑迷途豈識隂陽宗祖任教邪魅煉金丹悉是乾坤英秀間氣豪生十六絶粒停厨飡霞飲露返照自然相制鉛生五彩汞發三光方顯大丹苗裔開啟朱扉躍出金烏飛入玉蟾宫裏把隂陽交會神鑪烹浩然真體虚無内紫炁盤旋𤣥珠閃爍射透混成宗睿忘機修道隠迹求仙常㸃心無戀榮華悞了闕赤神丹恣情抛棄有人人識道專精謹守決然超彼十七洞曉𤣥機深明丹奥賴與祖宗符契龍耕虎種玉液金芝好箇道家活計闕驚天駭地闕陽首玉闕桂闕消息至闕十八志氣凌雲闕已天真闕要分闕烈士幹運機闗鑿開混沌奪得夜明如來輝輝寳葢赤赤靈光影隠大淵無滯休縱心猿盗了金鼎還丹謾勞虚費起三陽真火時時烹煉九還逃避十九冒雪冲霜迎風沐雨得遇至人開悟通㣲入妙起死迴生可謂煉丹規矩坎離相交反覆隂陽須藉木龍金虎把乾坤鼎器五行羅列刀圭成土𤣥妙處種就黄芽燒成丹藥此理向誰分訴玻瓈鳯孕碧玉龍珠飛出瑞雲深處掣電搖空諕得三尸奔走六賊逃出顯仙胎飛舞五雲繚繞樂聲齊舉二十静室修心雲山養道幾箇遇人傳訣鑪攅八卦鼎備三才修建道家基業隂與陽并斡轉樞機旋走虎龍蟠結這天機逆順學流不曉豈能分别希夷理瑞氣騰騰祥雲靄靄紫霧罩籠金闕千神咸備萬化全成方應大丹熟也琪樹瑤花遍滿虚無真景翠紅相别觀心澄曉月清風滿目洞天清徹右蘇武慢三十二首無俗念一首全真馮尊師道園虞先生所共作也天瑞昔刋道園遺稿而先生所作已附於編然其所謂馮尊師者最傳者二十篇世莫全覩今復併類編次以刻諸梓庶方外髙人便於通覽惟先生道學文章傳著天下馮尊師仙證異論超迥卓絶其自有洞源集行於世可考見云時至正二十四年嵗次甲辰秋八月二日癸巳渤海金天瑞謹識道園遺稿卷六
